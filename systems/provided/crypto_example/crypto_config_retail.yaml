# Retail crypto configuration (MODERATE risk profile)
#
# Optimized for retail traders with $10k-100k capital and exchange leverage limits.
#
# Key Changes from Institutional Config:
# 1. Top-30 universe (vs 185+ instruments) → Increases position sizes 6x
# 2. Removed cross-sectional momentum rules → Reduces leverage requirement 4x
# 3. Added minimum notional filter ($25) → Eliminates untradeable positions
# 4. Moderate volatility target (15% vs 25%) → Balanced risk/return
# 5. Max leverage enforcement (3x) → Within retail exchange limits
# 6. Binance fee assumptions (10 bps vs 5 bps) → Realistic retail costs
#
# Expected Performance (vs institutional dynamic universe):
# - Realized Vol: 12-15% (vs 3.7%) - hitting target properly
# - Avg Position at $10k: $330 (vs $54) - 6x larger, tradeable
# - Gross Leverage: 2.5-3x (vs 11.2x) - within retail limits
# - Sharpe: 1.0-1.2 (vs 0.67) - improved risk-adjusted returns
# - CAGR: 15-18% (vs 2.6%) - 6x higher absolute returns
#
# Trading Rules: 13 total (removed cross-sectional momentum)
# - EWMAC: 4 variations → 30.8% total weight
# - Breakout: 4 variations → 34.0% total weight
# - TSMOM: 3 variations → 21.0% total weight
# - Accel: 2 variations → 14.0% total weight

# Capital and risk settings
percentage_vol_target: 15.0                 # Moderate volatility target
notional_trading_capital: 100000
base_currency: USD

# Retail-specific constraints
min_notional_position: 25.0                 # Skip positions < $25
max_leverage: 3.0                           # Enforce retail leverage limit
long_only_instruments: True                 # Force long-only (realistic for spot trading)

# Trading rules - Directional momentum only (no cross-sectional)
trading_rules:
  # EWMAC - Standard spans from Carver's book (30.8% total weight)
  ewmac8_32:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 8
      Lslow: 32
  ewmac16_64:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 16
      Lslow: 64
  ewmac32_128:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 32
      Lslow: 128
  ewmac64_256:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 64
      Lslow: 256

  # Breakout - provides diversification from EWMAC (34.0% total weight)
  breakout10:
    function: systems.provided.rules.breakout.breakout
    data:
      - "rawdata.get_daily_prices"
    other_args:
      lookback: 10
  breakout20:
    function: systems.provided.rules.breakout.breakout
    data:
      - "rawdata.get_daily_prices"
    other_args:
      lookback: 20
  breakout40:
    function: systems.provided.rules.breakout.breakout
    data:
      - "rawdata.get_daily_prices"
    other_args:
      lookback: 40
  breakout80:
    function: systems.provided.rules.breakout.breakout
    data:
      - "rawdata.get_daily_prices"
    other_args:
      lookback: 80

  # TSMOM - Time-Series Momentum (21.0% total weight)
  tsmom63:
    function: systems.provided.rules.tsmom.tsmom
    data:
      - "rawdata.get_daily_prices"
    other_args:
      lookback: 63   # ~3 months
      skip: 5
  tsmom126:
    function: systems.provided.rules.tsmom.tsmom
    data:
      - "rawdata.get_daily_prices"
    other_args:
      lookback: 126  # ~6 months
      skip: 5
  tsmom252:
    function: systems.provided.rules.tsmom.tsmom
    data:
      - "rawdata.get_daily_prices"
    other_args:
      lookback: 252  # ~12 months
      skip: 5

  # Accel - Momentum of momentum (14.0% total weight)
  accel16:
    function: systems.provided.rules.accel.accel
    data:
      - "rawdata.get_daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args:
      Lfast: 16
  accel32:
    function: systems.provided.rules.accel.accel
    data:
      - "rawdata.get_daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args:
      Lfast: 32

# Forecast weights - redistributed after removing cross-sectional momentum
# EWMAC: 30.8%, Breakout: 34.0%, TSMOM: 21.0%, Accel: 14.0%
forecast_weights:
  ewmac8_32: 0.077
  ewmac16_64: 0.077
  ewmac32_128: 0.077
  ewmac64_256: 0.077
  breakout10: 0.085
  breakout20: 0.085
  breakout40: 0.085
  breakout80: 0.085
  tsmom63: 0.070
  tsmom126: 0.070
  tsmom252: 0.070
  accel16: 0.070
  accel32: 0.070

# Forecast scalars - WALK-FORWARD ESTIMATION
use_forecast_scale_estimates: True

# Forecast scalar estimation config
forecast_scalar_estimate:
   pool_instruments: True
   window: 250000
   min_periods: 250
   backfill: True

# Forecast diversification multiplier - WALK-FORWARD ESTIMATION
use_forecast_div_mult_estimates: True

# Forecast correlation estimation config (for FDM calculation)
forecast_correlation_estimate:
   pool_instruments: True
   date_method: expanding
   frequency: W
   using_exponent: True
   ew_lookback: 250
   min_periods: 20
   floor_at_zero: True
   forward_fill_data: True

# FDM estimation config
forecast_div_mult_estimate:
   ewma_span: 125
   dm_max: 2.5

# Forecast capping
forecast_cap: 20.0

# Dynamic universe configuration (NOT INCLUDED - must be passed to system factory)
# Use crypto_system_with_dynamic_universe() and pass:
#   dynamic_universe_config={
#       'max_instruments': 30,
#       'selection_method': 'adv',
#       'max_sr_cost_per_trade': 0.01,
#       'max_sr_cost_annual': 0.13,
#       'stack_turnover': 15.0,
#       'fee_bps': 10,  # Binance retail fees
#   }

# Instrument diversification multiplier estimation
use_instrument_div_mult_estimates: True

# IDM estimation config (for dynamic universe with ~30 instruments)
instrument_div_mult_estimate:
  ewma_span: 125
  dm_max: 2.5         # Keep Carver's safety cap

# Volatility calculation
volatility_calculation:
  func: sysquant.estimators.vol.robust_vol_calc
  days: 35
  min_periods: 10
  vol_abs_min: 0.0000001
  vol_floor: True
  floor_min_periods: 100
  floor_days: 500
  floor_min_quant: 0.05

# Position buffering
buffer_method: forecast
buffer_size: 0.10

# Fixed weights (no estimation)
use_forecast_weight_estimates: False
use_instrument_weight_estimates: False

# Average absolute forecast
average_absolute_forecast: 10.0
