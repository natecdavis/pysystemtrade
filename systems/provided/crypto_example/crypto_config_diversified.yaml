# Diversified crypto configuration following Carver's principles
#
# Improvements over robust config:
# 1. Added breakout rules for forecast diversification
# 2. More instruments (12 vs 7) for instrument diversification
# 3. Both standard and faster EWMAC lookbacks
# 4. Recalibrated FDM for larger rule set
# 5. Added TSMOM (time-series momentum), Accel, and RelMomentum (XSMOM) rules
#
# Trading rules: 15 total
# - EWMAC: 4 variations (8/32, 16/64, 32/128, 64/256)
# - Breakout: 4 variations (10, 20, 40, 80)
# - TSMOM: 3 variations (63, 126, 252 day lookbacks)
# - Accel: 2 variations (16, 32)
# - RelMomentum: 2 variations (20, 40 day horizons) - cross-sectional momentum

# Capital and risk settings
#
# Volatility Target Guidance (from Carver's "Leveraged Trading"):
# - Full-Kelly:    vol = expected SR (risky, max growth, large drawdowns)
# - Half-Kelly:    vol = SR / 2 (recommended for most traders)
# - Quarter-Kelly: vol = SR / 4 (for negative skew strategies)
# - Starter System: 12% (recommended for beginners)
# - Max for semi-automatic trading: 25%
#
# Current setting: 25% (aggressive, requires close monitoring)
# For a carry strategy, use vol_target = trend_vol_target / 2
#
# Speed Limit Rule: Costs should be < 1/3 of expected gross Sharpe Ratio
# Cost SR = Annual Costs / Vol Target
# At 25% vol and 0.6% annual costs: Cost SR = 0.024 (well under limit)
#
percentage_vol_target: 25.0
notional_trading_capital: 100000
base_currency: USD

# Trading rules - EWMAC + Breakout ensemble
trading_rules:
  # EWMAC - Standard spans from Carver's book
  ewmac8_32:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 8
      Lslow: 32
  ewmac16_64:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 16
      Lslow: 64
  ewmac32_128:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 32
      Lslow: 128
  ewmac64_256:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 64
      Lslow: 256
  # Breakout - provides diversification from EWMAC
  breakout10:
    function: systems.provided.rules.breakout.breakout
    data:
      - "rawdata.get_daily_prices"
    other_args:
      lookback: 10
  breakout20:
    function: systems.provided.rules.breakout.breakout
    data:
      - "rawdata.get_daily_prices"
    other_args:
      lookback: 20
  breakout40:
    function: systems.provided.rules.breakout.breakout
    data:
      - "rawdata.get_daily_prices"
    other_args:
      lookback: 40
  breakout80:
    function: systems.provided.rules.breakout.breakout
    data:
      - "rawdata.get_daily_prices"
    other_args:
      lookback: 80
  # TSMOM - Time-Series Momentum (Moskowitz et al.)
  # Vol-normalized cumulative returns with skip period
  tsmom63:
    function: systems.provided.rules.tsmom.tsmom
    data:
      - "rawdata.get_daily_prices"
    other_args:
      lookback: 63   # ~3 months
      skip: 5
  tsmom126:
    function: systems.provided.rules.tsmom.tsmom
    data:
      - "rawdata.get_daily_prices"
    other_args:
      lookback: 126  # ~6 months
      skip: 5
  tsmom252:
    function: systems.provided.rules.tsmom.tsmom
    data:
      - "rawdata.get_daily_prices"
    other_args:
      lookback: 252  # ~12 months
      skip: 5
  # Accel - Momentum of momentum (Carver)
  # Change in EWMAC signal over time
  accel16:
    function: systems.provided.rules.accel.accel
    data:
      - "rawdata.get_daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args:
      Lfast: 16
  accel32:
    function: systems.provided.rules.accel.accel
    data:
      - "rawdata.get_daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args:
      Lfast: 32
  # RelMomentum (XSMOM) - Cross-sectional momentum
  # Compares each instrument to median of all crypto instruments
  relmomentum20:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "rawdata.get_cumulative_daily_vol_normalised_returns"
      - "rawdata.normalised_price_for_asset_class"
    other_args:
      horizon: 20
  relmomentum40:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "rawdata.get_cumulative_daily_vol_normalised_returns"
      - "rawdata.normalised_price_for_asset_class"
    other_args:
      horizon: 40

# Forecast scalars - WALK-FORWARD ESTIMATION
# Using pysystemtrade's built-in walk-forward estimation to avoid lookahead bias.
# Fixed scalars removed - they were calibrated on full dataset (lookahead).
#
# Reference - Carver's book values (Systematic Trading, Appendix B):
#   ewmac8_32: 5.3, ewmac16_64: 3.75, ewmac32_128: 2.65, ewmac64_256: 1.87
#
# With walk-forward estimation, scalars are calculated at each point using
# only historical data available up to that date.

# Forecast weights - equal weighted across 15 rules
# EWMAC: 26.7%, Breakout: 26.7%, TSMOM: 20%, Accel: 13.3%, RelMom: 13.3%
forecast_weights:
  ewmac8_32: 0.0667
  ewmac16_64: 0.0667
  ewmac32_128: 0.0667
  ewmac64_256: 0.0667
  breakout10: 0.0667
  breakout20: 0.0667
  breakout40: 0.0667
  breakout80: 0.0667
  tsmom63: 0.0667
  tsmom126: 0.0667
  tsmom252: 0.0667
  accel16: 0.0667
  accel32: 0.0667
  relmomentum20: 0.0667
  relmomentum40: 0.0667

# Forecast diversification multiplier - WALK-FORWARD ESTIMATION
# FDM is calculated walk-forward based on observed correlations.
# Fixed value removed to avoid lookahead bias.
#
# Formula: FDM = sqrt(n) / sqrt(1 + (n-1)*avg_correlation)
# With 15 rules and ~0.45 avg corr: sqrt(15) / sqrt(1 + 14*0.45) ≈ 1.42

# Forecast capping
forecast_cap: 20.0

# Instruments - currently hardcoded, equal weighted
# These 12 were selected via Carver's cost/diversification analysis.
#
# DYNAMIC UNIVERSE (alternative approach):
# For walk-forward instrument selection based on cost filters, use:
#   from sysdata.crypto.spot_sim_data import csvSpotSimData
#   data = csvSpotSimData(
#       data_path='data/crypto',
#       use_dynamic_universe=True,
#       dynamic_universe_config={
#           'max_sr_cost_per_trade': 0.01,  # 1% of SR per trade
#           'max_sr_cost_annual': 0.13,     # 13% of annual SR
#           'stack_turnover': 15,           # ~15 round-trips/year
#       }
#   )
# Then use data.get_eligible_instruments_at_date(date) for the universe.
# See systems/provided/crypto_example/analyze_universe.py for diagnostics.
#
instrument_weights:
  BTC: 0.083
  ETH: 0.083
  LTC: 0.083
  XRP: 0.083
  XLM: 0.083
  ADA: 0.083
  LINK: 0.083
  ATOM: 0.083
  DOT: 0.083
  UNI: 0.083
  AAVE: 0.083
  SOL: 0.083

# Instrument diversification multiplier
# 12 instruments with ~0.64 avg correlation
# IDM = sqrt(12) / sqrt(1 + 11*0.64) = 3.46 / 2.83 = 1.22
instrument_div_multiplier: 1.22

# Volatility calculation
volatility_calculation:
  func: sysquant.estimators.vol.robust_vol_calc
  days: 35
  min_periods: 10
  vol_abs_min: 0.0000001
  vol_floor: True
  floor_min_periods: 100
  floor_days: 500
  floor_min_quant: 0.05

# Position buffering
buffer_method: forecast
buffer_size: 0.10

# Forecast scalars and FDM - WALK-FORWARD ESTIMATION
# Scalars and FDM are estimated walk-forward using expanding windows.
# Pooling across instruments provides stable estimates while NaN handling
# allows instruments to join at different times.
use_forecast_scale_estimates: True
use_forecast_div_mult_estimates: True

# Forecast scalar estimation config
forecast_scalar_estimate:
   pool_instruments: True          # Pool across all instruments using each rule
   window: 250000                   # Use all available data (expanding window)
   min_periods: 250                 # ~1 year before first estimate
   backfill: True                   # Backfill early period with first estimate

# Forecast correlation estimation config (for FDM calculation)
forecast_correlation_estimate:
   pool_instruments: True          # Pool instruments with same rules
   date_method: expanding          # Walk-forward (not rolling)
   frequency: W                    # Weekly recalculation
   using_exponent: True            # EWMA correlation
   ew_lookback: 250                # 250-period lookback
   min_periods: 20                 # Minimum 20 observations
   floor_at_zero: True             # No negative correlations
   forward_fill_data: True

# FDM estimation config
forecast_div_mult_estimate:
   ewma_span: 125                  # Smooth FDM over ~6 months
   dm_max: 2.5                     # Cap at 2.5

# Reference - Carver's book values (Systematic Trading, Appendix B):
# forecast_scalars:
#   ewmac8_32: 5.3
#   ewmac16_64: 3.75
#   ewmac32_128: 2.65
#   ewmac64_256: 1.87
#   breakout10: 2.0
#   breakout20: 1.6
#   breakout40: 1.4
#   breakout80: 1.2
# forecast_div_multiplier: 1.32  # FDM = sqrt(8) / sqrt(1 + 7*0.55)

# Fixed weights (no estimation needed for these)
use_forecast_weight_estimates: False
use_instrument_weight_estimates: False
use_instrument_div_mult_estimates: False

# Average absolute forecast
average_absolute_forecast: 10.0
