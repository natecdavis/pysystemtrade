# Robust crypto configuration following Carver's principles
#
# Key design choices:
# 1. Standard EWMAC spans from "Systematic Trading" Appendix B
# 2. A priori forecast scalars (not fitted)
# 3. Equal instrument weights (no performance-based selection)
# 4. Only instruments with 5+ years of history
# 5. Conservative cost estimates
# 6. No fitted parameters - all from theory or book values

# Capital and risk settings
percentage_vol_target: 25.0
notional_trading_capital: 100000
base_currency: USD

# Trading rules - STANDARD EWMAC spans from Carver's book
# Using the classic 1:4 ratio (Lfast:Lslow)
# Only using spans with sufficient data for estimation
trading_rules:
  ewmac8_32:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 8
      Lslow: 32
  ewmac16_64:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 16
      Lslow: 64
  ewmac32_128:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 32
      Lslow: 128
  ewmac64_256:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 64
      Lslow: 256

# Forecast scalars - FROM APPENDIX B of "Systematic Trading"
# These are a priori values, NOT fitted to data
forecast_scalars:
  ewmac8_32: 5.3
  ewmac16_64: 3.75
  ewmac32_128: 2.65
  ewmac64_256: 1.87

# Forecast weights - EQUAL weighted (no optimization)
# This is Carver's recommended starting point
forecast_weights:
  ewmac8_32: 0.25
  ewmac16_64: 0.25
  ewmac32_128: 0.25
  ewmac64_256: 0.25

# Forecast diversification multiplier
# For 4 correlated trend rules, ~1.2-1.4 is typical
# Using 1.2 (conservative) rather than fitted value
forecast_div_multiplier: 1.2

# Forecast capping - standard value
forecast_cap: 20.0

# Instrument selection criteria:
# - Minimum 5 years of history (for statistical reliability)
# - Only major, liquid cryptocurrencies
# - Equal weighted (no performance-based selection)
#
# BTC: 2013-present (11+ years) - INCLUDED
# ETH: 2015-present (9+ years) - INCLUDED
# LTC: 2013-present (11+ years) - INCLUDED
# XRP: 2017-present (7+ years) - INCLUDED
# XLM: 2017-present (7+ years) - INCLUDED
# ADA: 2018-present (6+ years) - INCLUDED
# LINK: 2019-present (5+ years) - INCLUDED
#
# EXCLUDED (< 5 years): SOL, DOT, UNI, AAVE, ATOM, MATIC, AVAX, NEAR, etc.

instrument_weights:
  BTC: 0.143
  ETH: 0.143
  LTC: 0.143
  XRP: 0.143
  XLM: 0.143
  ADA: 0.143
  LINK: 0.143

# Instrument diversification multiplier
# For 7 correlated crypto assets, sqrt(7) * avg_corr adjustment
# Crypto correlations typically 0.5-0.8, so IDM ~ 1.2-1.5
# Using 1.2 (conservative)
instrument_div_multiplier: 1.2

# Volatility calculation - standard settings
volatility_calculation:
  func: sysquant.estimators.vol.robust_vol_calc
  days: 35
  min_periods: 10
  vol_abs_min: 0.0000001
  vol_floor: True
  floor_min_periods: 100
  floor_days: 500
  floor_min_quant: 0.05

# Position buffering - reduces trading frequency
buffer_method: forecast
buffer_size: 0.10

# CRITICAL: Use FIXED weights, not estimated
# Estimation with limited crypto data would be overfit
use_forecast_weight_estimates: False
use_forecast_scale_estimates: False
use_instrument_weight_estimates: False
use_forecast_div_mult_estimates: False
use_instrument_div_mult_estimates: False

# Average absolute forecast
average_absolute_forecast: 10.0
