# ============================================================================
# FORECAST WEIGHTS — DEFAULT PROFILE  (22 trend rules, 7 families)
# ============================================================================
# 7 families, equal family budget (1/7 each), equal weight within family.
# Carry stays fixed at 1% each (3% total, additive via ForecastCombineGated).
#
# IC audit results (15 sample instruments, dataset_538registry_6yr_jagged):
#   resmom    IC@5d=0.0767  t=2.8  ← #1 family (beats all trend families)
#   trend     IC@5d=0.0554  t=2.1
#   carry     IC@5d=-0.009         ← excluded (negative IC, per previous audit)
#   reversion IC@5d=-0.018         ← excluded (negative IC, per previous audit)
#
# Sector momentum (tested 2026-02-28): Sharpe 0.96 vs 0.99 baseline (-3.0%) → REJECTED
# Root cause: top-K dynamic portfolio (~30 instruments) has 0-5 members per sector;
# most sector indices return NaN, wasting the budget taken from trend rules.
#
# Budget allocation:
#   22 trend rules = 1/7 per family = 100% total
#   vol_norm_carry_10/30/60: 1.000% each (additive, gated by carry_weight param)
# ============================================================================

forecast_weights:
  # FLAT 1/N WEIGHTS (adopted 2026-04-15): 56 rules × 1.786% = 100%
  # Walk-forward comparison: flat-56 (Sharpe 1.269, Calmar 1.506) beats flat-42 (Sharpe 0.931)
  # by +36% Sharpe. Every gate/adaptive scheme underperforms flat-56. Including all 56 candidate
  # rules at equal weight dominates in-sample curation. All sweep-optimized weights are overfit.
  #
  # EWMAC: 3 rules × 4.762% = 14.286%
  # (ewmac_4 removed: 77 rt/yr, 62% instruments fail annual SR cost test)
  ewmac_8: 0.017857

  ewmac_16: 0.017857

  ewmac_32: 0.017857


  # Breakout: 4 rules × 3.571% = 14.284%
  # (breakout_10 removed: 132 rt/yr, 100% fail)
  breakout_20: 0.017857

  breakout_40: 0.017857

  breakout_80: 0.017857

  breakout_160: 0.017857


  # Normmom: 3 rules × 4.762% = 14.286%
  # (normmom_4 removed: 68 rt/yr, 37% fail)
  normmom_8: 0.017857

  normmom_16: 0.017857

  normmom_32: 0.017857


  # Accel: 3 rules × 4.762% = 14.286%
  accel_16: 0.017857

  accel_32: 0.017857

  accel_64: 0.017857


  # Assettrend: 4 rules × 3.571% = 14.284%
  assettrend_8: 0.017857

  assettrend_16: 0.017857

  assettrend_32: 0.017857

  assettrend_64: 0.017857


  # Relmomentum: 2 rules × 7.143% = 14.286%
  # (relmomentum_10 removed: 132 rt/yr, 100% fail)
  relmomentum_20: 0.017857

  relmomentum_40: 0.017857


  # ResidualMomentum: 3 rules × 4.762% = 14.286%
  # IC audit 2026-02-18: resmom is #1 family (IC@5d=0.077, t=2.8, IC@21d=0.112)
  # Ranks: resmom_16=#7, resmom_32=#13, resmom_64=#14 out of 48 rules
  residual_momentum_16: 0.017857

  residual_momentum_32: 0.017857

  residual_momentum_64: 0.017857


  # SectorMomentum — TESTED & REJECTED (2026-02-28): Sharpe 0.96 vs 0.99 baseline (-3.0%)
  # Rules removed from weights. Code and data/sector_map.json preserved for future research.
  # sector_momentum_10: 0.0
  # sector_momentum_20: 0.0
  # sector_momentum_40: 0.0

  # Gated Carry: 3 rules × 5.0% = 15.0% (Carver-compliant refactor, 2026-03-06)
  # Gate baked into rule function; goes through standard scalar → FDM pipeline.
  # vol_norm_carry_10/30/60 removed from weights (rules kept for reference).
  # Sweep 2026-03-07 (carry_10/30): 1.4× empirical ratio → w=0.07 (Calmar peak, ΔSharpe +4.0%, ΔMaxDD -0.06pp)
  # Sweep 2026-03-07 (carry_60):    3.17× empirical ratio → w=0.10 (Calmar peak, ΔSharpe +2.6%, ΔMaxDD +1.16pp)
  # Sweep 2026-04-02 (post-funding_mr): equal weights, w=0.20 peak (ΔSharpe +38.6%, ΔCalmar +0.79, MaxDD -5.34%)
  #   w=0.15 adopted (conservative; cliff at w=0.30, trend diluted to 48%). ΔSharpe +35.6%, ΔCalmar +0.48, MaxDD -6.42%
  gated_carry_10: 0.017857

  gated_carry_30: 0.017857

  gated_carry_60: 0.017857

  # gated_carry_90/180: included at 1/N (flat-56 adoption 2026-04-15)
  gated_carry_90: 0.017857

  gated_carry_180: 0.017857


  # Cross-sectional signals (moved from additive sleeves, 2026-03-06 refactor)
  # Sweep 2026-03-07: w=0.10 (Calmar peak, ΔSharpe +2.9%, ΔCalmar +0.067, ΔMaxDD +1.20pp)
  # Calmar peaks at 0.10 (0.993 vs 0.926 baseline) — same Calmar-peak criterion as carry sweeps.
  # Uncovered instruments get NaN → weight renormalized to 0 for that instrument.
  xs_carry: 0.017857

  xs_activity: 0.017857

  xs_val: 0.017857

  inter_sector: 0.017857


  # CS Mean Reversion: REJECTED 2026-03-10
  # Sweep [0.0, 0.03, 0.05, 0.07, 0.10, 0.15, 0.20]: Calmar-peak at w=0.0 (1.437).
  # Calmar monotonically declines to 0.91 at w=0.20. No weight passes ΔSharpe >+1%.
  # Cost audit: gross_SR=-0.526 (cs_mr_125), -0.411 (cs_mr_250) — pre-cost losing rules.
  # XS mean reversion is anti-signal in trending crypto 2020-2026 (strong XS momentum).
  # cs_mr_125: 0.0  # REJECTED
  # cs_mr_250: 0.0  # REJECTED

  # Skew-abs: Carver (2020) time-series skew signal, 3 lookbacks.
  # Sweep 2026-03-08: Calmar-peak at w_combined=0.05 (0.0167/rule).
  # ΔSharpe +1.3%, ΔCalmar -0.005 (noise-level), ΔMaxDD -0.07pp vs no-skew baseline.
  # 365-only at equivalent budget is strictly worse on both Sharpe and Calmar —
  # 90d/180d provide genuine diversification in the 6-year crypto dataset.
  skew_abs_90: 0.017857

  skew_abs_180: 0.017857

  skew_abs_365: 0.017857


  # Skew-rv: Carver (2020) relative-value skew signal, 3 lookbacks.
  # Daily cross-sectional normalization (subtract today's crypto-wide mean skew).
  # Sweep 2026-03-08: Calmar-peak at w_combined=0.05 (0.0167/rule).
  # ΔSharpe +1.0%, ΔCalmar +0.011 (Calmar peaks ABOVE baseline), ΔMaxDD -0.11pp.
  # D1 re-sweep 2026-03-28: Calmar-peak at 0.08 (1.9461, +6.2%). Window narrows after 0.08.
  skew_rv_90: 0.017857  # was 0.03 (D1 2026-03-27); re-sweep confirms 0.08 is Calmar-peak
  skew_rv_180: 0.017857

  skew_rv_365: 0.017857


  # De-meaned carry: ADOPTED 2026-03-27 — ungated variant, w_combined=0.15 (0.05/rule)
  demeaned_carry_10: 0.017857

  demeaned_carry_30: 0.017857

  demeaned_carry_60: 0.017857

  demeaned_carry_gated_10: 0.017857

  demeaned_carry_gated_30: 0.017857

  demeaned_carry_gated_60: 0.017857


  # Funding mean-reversion: fires only at extreme funding z-scores (|z|>2.0)
  # ADOPTED 2026-03-31 w=0.25: ΔSharpe -0.1%, ΔCalmar +35.3%, MaxDD -9.65%→-6.47%
  funding_mr: 0.017857


  # Persistent funding crowding: sweep_funding_crowd_weight.py to find optimal weight
  funding_crowd_5: 0.017857

  funding_crowd_10: 0.017857


  # LSR-based signals: sweep_oi_lsr_weight.py to find optimal weight
  lsr_divergence: 0.017857

  lsr_retail_crowding: 0.017857


  # Crowd-deleveraging trend amplifier: sweep_crowd_deleverage_weight.py to find optimal weight
  crowd_deleverage_trend: 0.017857


  # HL-filtered median variants — included at 1/N (flat-56 adoption)
  demeaned_carry_hl_10: 0.017857

  demeaned_carry_hl_30: 0.017857

  demeaned_carry_hl_60: 0.017857


  # Removed entirely (cost audit):
  #   btc_lead_lag_1/2: 480 rt/yr, annual drag ~1.4 SR each
  #   streversal_1:     424 rt/yr, annual drag 1.26 SR

  # Round-number breakout: ADOPTED 2026-04-10, w_combined=0.08 (Calmar peak: +12.8%)
  round_number_break_10: 0.017857

  round_number_break_20: 0.017857

  round_number_break_40: 0.017857

  round_number_prox: 0.017857       # static sweep rejected; included at 1/N per flat-56 adoption

forecast_cap: 20.0

# ============================================================================
# XSMOM LONG-ONLY GATE
# ============================================================================
# Clips XSMOM rule forecasts to max(0, forecast) before combining.
# Literature: Han et al. (2024) / Dobrynskaya — cross-sectional momentum alpha is
# concentrated in the LONG side (winner momentum). The short leg of XS rules tends
# to mean-revert, not continue falling. TSMOM rules (EWMAC, breakout, accel) still
# go short freely — they are time-series signals about the instrument's own trend.
#
# xsmom_long_only: false = symmetric (default, baseline unchanged)
#                  true  = clip XSMOM negative forecasts to 0
# xsmom_rule_list: rules to gate (relmomentum only by default;
#                  assettrend excluded — bear-market shorts may be genuine trend)
#
# Adoption criteria: ΔSharpe ≥ +1%, ΔCrisis > -5pp, ΔMaxDD > -3pp
# Sweep (gate_relmom vs gate_all_xsmom): scripts/sweep_xsmom_long_only.py
use_gated_carry: true  # Enable ForecastCombineGated (sector sleeve, XSMOM gate, tilt)
xsmom_long_only: false
xsmom_rule_list:
  - relmomentum_20
  - relmomentum_40
  # assettrend_8/16/32/64 excluded by default (test via gate_all_xsmom config)

# Additive sector momentum sleeve (no budget taken from trend rules)
# Added AFTER trend+carry combination: final += sector_weight × mean(sector_forecasts)
# sector_forecasts are pulled directly from ForecastScaleCap (±20 scale, already capped)
# IC audit (2026-02-28): sector family IC@5d=0.087, IC@21d=0.155 — ranks #1 family
# sector_weight: effective fractional contribution relative to avg trend forecast (~5 units)
#   0.05 → ~5% additive  |  0.10 → ~10% additive  |  0.20 → ~20% additive
sector_rule_list:
  - sector_momentum_10
  - sector_momentum_20
  - sector_momentum_40

sector_weight: 0.0  # PAUSED: additive test passed (+1.5% Sharpe) but reverted for simplicity

# ============================================================================
# FORECAST TILT — LONG/SHORT BIAS OFFSET
# ============================================================================
# Shifts the combined forecast by a constant before FDM and ±20 cap.
# Positive → long bias; negative → short bias.
#
# Calibration (2026-03-02): Long/Short Sharpe asymmetry confirmed:
#   Long Sharpe:  0.803  |  Short Sharpe:  0.597  |  Ratio: 1.345 (> 1.2 → tilt warranted)
#   Bear market: Short Sharpe = -0.339 (short leg loses money in downtrends!)
# Suggested offsets to test: [+1.0, +2.0, +3.0, +5.0]
# Adoption criteria: Sharpe +1%, crisis return drop < 5pp, MaxDD < +3pp
#
# 0.0 = symmetric (default, no tilt) — reproduces baseline Sharpe exactly
forecast_tilt_offset: 0.0

# ============================================================================
# CROSS-SECTIONAL SIGNALS — LOOKBACK PARAMETERS
# ============================================================================
# These 4 signals were refactored from additive sleeves to standard Carver rules
# (2026-03-06). Lookback values are now read by the data layer at init time to
# pre-compute the forecast panels. Weights are specified in forecast_weights above.
#
# Note: The old *_weight keys (xscarry_weight, inter_sector_weight, xs_activity_weight,
# xs_val_weight) have been removed — weights now live in forecast_weights section.
# ============================================================================

# XS Carry: EWM smoothing window for funding rate (days; 30 ≈ monthly cadence)
# Lit: He et al. (2024) — XS funding rank Sharpe 1.8-3.5 in pure strategy
xs_carry_lookback: 30

# Inter-Sector: EWMAC fast window for sector-aggregate momentum (days)
# Lit: Cong et al. (2022) C-5 — sector rotation analogous to country effects
inter_sector_lookback: 20

# XS Activity: EWM smoothing window for active address count (days)
# Lit: Cong et al. (2022) C-5 — network activity / utility value factor
# Data: data/active_addresses.parquet (42 instruments, CoinMetrics AdrActCnt)
xs_activity_lookback: 30

# ============================================================================
# CROSS-SECTIONAL ADDRESS GROWTH — DISABLED (dead code, keep for reference)
# ============================================================================
# Carver ablation 2026-03-06: true marginal ΔSharpe = -0.3% (near-zero) → DISABLED.
# Sequential +1.6% gain was in-sample noise (overlap with xs_activity + xs_val).
# Architecture still present in forecast_combine_gated.py; weight stays at 0.
xs_addr_growth_weight: 0.0
xs_addr_growth_lookback: 30
xs_addr_growth_window: 90

# XS VAL: EWM smoothing window for AdrActCnt/MarketCap ratio (days)
# Lit: Cong et al. (2022) C-5 VAL factor — crypto book-to-market
# Data: data/active_addresses.parquet + data/market_cap.parquet (41 instruments)
xs_val_lookback: 30

# ============================================================================
# OI REGIME OVERLAY CONFIGURATION (PHASE 1 - ADOPTED 2026-02-21)
# ============================================================================
# Defensive position scaling based on funding rate z-score (OI proxy).
#
# When use_oi_overlay: true:
#   - Positions are scaled down when |funding_z_score| > threshold
#   - High positive/negative funding → crowded positioning → cascade risk
#   - Multiplier range: [min_scale, 1.0]
#
# Phase 1 (Standard Overlay): Uses funding_rate as OI proxy
# Phase 1.5 (Trend-Aware): Tested and REJECTED (worse than standard)
# Phase 2 (Future): True OI/Volume ratio (optional enhancement)
#
# ADOPTION DECISION (2026-02-21):
# ✅ Standard overlay ADOPTED based on acute crash analysis
# ❌ Trend-aware overlay REJECTED (no improvement vs standard)
#
# Performance (6-year backtest, 2020-2026):
#   Sharpe:          0.9879 (baseline) → 0.9933 (standard) = +0.55% ✅
#   Annual Vol:      22.42% (baseline) → 21.55% (standard) = -3.9% ✅
#   Max DD:          -23.72% (baseline) → -22.59% (standard) = +1.1% ✅
#   Turnover:        15.35x (baseline) → 18.28x (standard) = +19.1% ⚠️
#   Transaction Cost: 45 bps/yr (baseline) → 54 bps/yr (standard) = +21% ⚠️
#
# Acute Crash Protection (3 events: May 2021, June 2022, Nov 2022):
#   Average return delta: +0.59% vs baseline ✅
#   Crash wins: 2 out of 3 events ✅
#   Drawdown improvement: ALL 3 events (+0.41% avg) ✅
#
# Analysis: out/oi_trend_aware/ACUTE_CRASH_FINDINGS.md
# ============================================================================

use_oi_overlay: true  # RE-CONFIRMED 2026-03-31: disabling gives -3.3% Sharpe/-2.3% Calmar vs current system. Prior rejection (2026-03-26) was pre-demeaned_carry/skew_rv changes.

# OI overlay parameters (only used when use_oi_overlay: true)
oi_overlay_params:
  mode: funding          # Phase 1 proxy retained: Phase 2 OI/Volume tested, no improvement
  lookback: 90           # Rolling window for funding z-score (days)
  threshold: 2.0         # Z-score threshold where scaling begins (σ units)
  min_scale: 0.5         # Minimum position multiplier (0.5 = max 50% reduction)
  trend_aware: false     # DISABLED: Trend-aware mode (rejected after testing)

# ============================================================================
# FEAR & GREED REGIME OVERLAY CONFIGURATION
# ============================================================================
# Contrarian sentiment overlay: scale down positions during extreme greed.
#
# Source: alternative.me Fear & Greed Index (0–100, daily, available from 2018)
#   0–24   = Extreme Fear   (panic — trend signals reliable, no suppression)
#   25–49  = Fear
#   50     = Neutral
#   51–74  = Greed
#   75–100 = Extreme Greed  (crowded/bubble — scale down positions)
#
# Logic:
#   F&G ≤ greed_threshold → multiplier = 1.0 (no scaling)
#   F&G > greed_threshold → linear scale-down from 1.0 → min_scale as F&G → 100
#
# Applied AFTER OI overlay:
#   position = base × oi_multiplier × fg_multiplier
#
# Data download: python scripts/download_fg_index.py → data/fg_index.parquet
# Auto-discovered from data/ directory alongside parquet dataset.
#
# Status: Testing pending. Set use_fg_overlay: true after sweep confirms benefit.
# ============================================================================

use_fg_overlay: false  # REJECTED: best ΔSharpe +0.30% (below +1% threshold). Keep false permanently.

# F&G overlay parameters (only used when use_fg_overlay: true)
fg_overlay_params:
  greed_threshold: 75   # F&G > 75 → start scaling down (Greed / Extreme Greed zone)
  fear_threshold: 25    # F&G < 25 → no action (fear = trend signals reliable)
  min_scale: 0.5        # Maximum scale-down (0.5 = 50% of normal position at F&G=100)

# ============================================================================
# MVRV CYCLE FILTER
# ============================================================================
# MVRV = CapMrktCurUSD / CapRealUSD (BTC on-chain valuation ratio).
# Values above ~2.5–3.5 indicate overheated market conditions; values below 1.0
# indicate undervaluation.
#
# Unlike F&G (fired only 9.5% of days → rejected), MVRV spends extended
# weeks/months above overbought levels during bull runs. Sustained signal
# duration is why MVRV is expected to be materially more impactful than F&G.
#
# Multiplier logic (contrarian):
#   MVRV > overbought_threshold → linear taper from 1.0 → min_scale as MVRV → max_mvrv
#   MVRV ≤ overbought_threshold → 1.0 (no scaling)
#
# Applied AFTER OI and F&G overlays:
#   position = base × oi_multiplier × fg_multiplier × mvrv_multiplier
#
# Data download: python scripts/download_mvrv_index.py → data/mvrv_index.parquet
# Auto-discovered from data/ directory alongside parquet dataset.
#
# Source: CRYPTO_MARKET_FACTORS_LIT_REVIEW.md §4.4 — "MVRV/NUPL: Moderate evidence,
# Alpha (regime) type, Weekly-Monthly horizon, High implementability."
# ============================================================================

use_mvrv_overlay: false  # REJECTED: best ΔSharpe +0.46% at th=3.5 (below +1% threshold). Keep false permanently.

# MVRV overlay parameters (only used when use_mvrv_overlay: true)
mvrv_overlay_params:
  overbought_threshold: 3.0  # MVRV > 3.0 → start scaling down
  oversold_threshold: 1.0    # reserved for future oversold boost (no action currently)
  min_scale: 0.5             # maximum scale-down (50% of normal position)
  max_mvrv: 5.0              # MVRV at which min_scale is reached (clips above)

# ============================================================================
# DOWNSIDE BETA POSITION SCALAR
# Per-instrument, always-on multiplicative overlay (applied 4th, after MVRV).
# Reduces positions in instruments that amplify crypto bear-market crashes.
# β_down = Σ(r_i × r_m | r_m < 0) / Σ(r_m² | r_m < 0) — rolling OLS slope
# restricted to market down-days (market = cross-sectional median return).
# Cross-sectional rank per date: highest β_down (rank=1.0) → min_scale,
# lowest β_down (rank=0.0) → 1.0. Linear interpolation in between.
# NaN during warmup (< min_periods down-days in window) → scalar=1.0 (neutral).
# Orthogonal to OI overlay: OI is episodic+portfolio-level; β_down is
# continuous+per-instrument. Both multiply together when both active.
# ============================================================================
use_downside_beta_overlay: true
downside_beta_params:
  window: 90        # rolling window (days); ~4.5 months — longer window = smoother β_down signal
  min_periods: 20   # min down-market days before β_down is defined (warmup guard)
  min_scale: 0.3    # scalar applied to highest-β_down instrument (rank=1.0); W=90/S=0.30 optimal
  direction_aware: true  # only penalise long positions; preserve shorts at 1.0× (crash hedges)

# ============================================================================
# CORRELATION SHOCK OVERLAY
# ============================================================================
# Scales all positions down when mean cross-asset correlation spikes above
# threshold — indicating diversification breakdown (crash/systemic-stress regime).
# Signal: rolling mean pairwise correlation estimated via portfolio-variance
# decomposition (no pairwise matrix needed). Global: same multiplier all instruments.
# Carver analogue: "sum_abs_risk" component of his 4-part risk overlay.
# ============================================================================
use_correlation_shock_overlay: false  # enable in test config; adopt after sweep

correlation_shock_params:
  window: 30        # rolling window for variance estimation (days)
  threshold: 0.75   # mean_corr above which scaling begins (tune via sweep)
  min_scale: 0.5    # maximum reduction (0.5 = 50% at mean_corr=1.0)
  smooth_span: 5    # EWM span for smoothing the mean_corr signal

# ============================================================================
# SIZING AND CONSTRAINTS
# ============================================================================

sizing:
  vol_days: 63  # D4 sweep 2026-03-27: Calmar-peak at 63d

volatility_calculation:
  days: 63  # D4 sweep 2026-03-27: Calmar-peak at 63d

constraints:
  correlation_span: 60
  correlation_min_periods: 20

execution:
  buffer_frac: 0.1

# Top-level alias (kept for sweep_buffer_size.py hasattr check)
buffer_frac: 0.1
# Carver forecast-method buffer (pysystemtrade native, made explicit)
buffer_method: forecast
buffer_size: 0.1

costs:
  spread_estimate: 0.0005
  taker_fee_frac: 0.00045

output:
  equity_curve_file: "equity_curve.csv"
  positions_file: "positions.csv"
  pnl_breakdown_file: "pnl_breakdown.csv"
  write_diagnostics: true
  diagnostics_file: "diagnostics.parquet"

diagnostics:
  enabled: true

