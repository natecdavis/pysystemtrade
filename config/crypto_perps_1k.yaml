      - "rawdata.daily_returns_volatility"
    other_args: {carry_span: 180, trend_fast: 32, trend_slow: 128}

  # --------------------------------------------------------------------------
  # De-meaned carry: idiosyncratic funding rate (instrument minus universe mean)
  # vol-normalized, optionally trend-gated.
  # Initialized at weight 0.0 — sweep with sweep_demeaned_carry.py before adopting.
