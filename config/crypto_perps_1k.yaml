# ============================================================================
# CRYPTO PERPS — COST-FILTERED 22-RULE CONFIG (WITH OI OVERLAY + SECTOR SLEEVE)
# ============================================================================
# Created: 2026-02-17  |  Revised: 2026-02-21 (OI overlay adopted)
#                        Revised: 2026-02-28 (sector momentum additive sleeve ADOPTED)
# Purpose: Evidence-based rule trimming + trend-gated carry + OI regime overlay
#          + sector momentum additive sleeve
# Optimized: carry_weight=1.0, threshold=0.5, min_history=15d, OI overlay enabled
#            sector_weight=0.10 (additive, no budget taken from trend rules)
#
# Pass 1 (predictive accuracy audit): 45 → 26 rules
#   REMOVED — Carry family (negative IC when untreated)
#   REMOVED — Bad reversion (streversal_2/3, return_skew, mrinasset, illiquidity)
#   REMOVED — Slow trend rules (ewmac_64, normmom_64, breakout_320, relmomentum_80)
#
# Pass 2 (cost audit — forecast_turnover × SR/trade Carver test): 26 → 19 rules
#   Thresholds: SR/trade ≤ 0.01, Annual SR ≤ 0.13
#   Fleet SR/trade (BTC+ETH anchor): 0.0030
#
#   REMOVED — btc_lead_lag_1/2:  480 rt/yr, ratio 4.1–4.3×, 100% instruments fail
#                                 annual SR drag ~1.4 SR each — larger than full Sharpe
#   REMOVED — streversal_1:      424 rt/yr, ratio 3.75×, 100% fail, drag 1.26 SR
#   REMOVED — relmomentum_10:    132 rt/yr, 100% fail annual test on all 8 sample insts
#   REMOVED — breakout_10:       132 rt/yr, 100% fail annual test
#   REMOVED — ewmac_4:            77 rt/yr, 62% of instruments fail annual test
#   REMOVED — normmom_4:          68 rt/yr, 37% fail — removed to be conservative
#
# Pass 3 (gated carry addition): 19 → 22 rules (ADOPTED)
#   ADDED — Vol-normalized carry (3 rules, trend-gated)
#   Initial test: Sharpe 0.84 → 0.87 (w_c=0.2, th=1.0)
#   Optimized: Sharpe 0.84 → 0.95 (+13.1%, w_c=1.0, th=0.5)
#   Performance: CAGR 14.6% → 21.2% (+45.2%), Vol 18.3% → 23.0% (+25.7%)
#
# Pass 4 (sector momentum additive sleeve): ADOPTED (2026-02-28)
#   ADDED — Sector momentum (3 rules) as additive sleeve on top of trend+carry.
#   Budget-cutting approach (10% from trend) tested first → Sharpe -3.0% REJECTED.
#   IC audit: sector family IC@5d=0.087 (best family), sector_momentum_20 ranks #4/54.
#   Additive approach (sector_weight=0.10, no trend budget cut) → Sharpe +1.5% ADOPTED.
#   Implementation: ForecastCombineGated pulls sector forecasts directly from
#   ForecastScaleCap (±20 scale), averages 3 rules, adds sector_weight × avg.
#   Trend/carry weights completely untouched. Sector map: data/sector_map.json.
#   Result: Sharpe 0.99 → 1.006, CAGR 21.3% → 22.4%, Crisis 53.4% → 55.4%
#
# Rule Budget (22 rules, 7 families):
#   EWMAC ×3:           ewmac_8, ewmac_16, ewmac_32          (4.762% each)
#   Breakout ×4:        breakout_20/40/80/160                 (3.571% each)
#   Normmom ×3:         normmom_8, normmom_16, normmom_32    (4.762% each)
#   Accel ×3:           accel_16, accel_32, accel_64          (4.762% each)
#   Assettrend ×4:      assettrend_8/16/32/64                (3.571% each)
#   Relmomentum ×2:     relmomentum_20, relmomentum_40        (7.143% each)
#   ResidualMomentum ×3:resmom_16/32/64                      (4.762% each)
#   Carry ×3:           vol_norm_carry_10/30/60              (1.000% each, additive)
#   Sector ×3:          sector_momentum_10/20/40             (additive, w=0.10)
#
# Weight budget: 22 trend rules = 100% (sum=1.0) + carry = 3% additive + sector = 10% additive
# (ForecastCombine normalises trend; carry_weight and sector_weight control additive sleeves)
# ============================================================================

system:
  capital: 5000.0
  vol_target_ann: 0.25
  idm_cap: 2.5
  min_position_frac: 0.03
  allow_jagged: true

percentage_vol_target: 25.0
notional_trading_capital: 3500.0  # 3.5× phantom leverage (actual equity $1K): targets ~25% realized vol, Sharpe ~1.34, Calmar ~1.54
min_notional_position: 10.0  # HL minimum order size; reduce-only orders exempt (was 1.0)

# Dynamic universe systems need span=1 here. The pysystemtrade default (125) applies
# EWMA smoothing to weight transitions, which is appropriate for static Carver universes
# where instrument weights rarely change. In our top-K dynamic universe, the entry/exit
# hysteresis already provides stability. With span=125, exited instruments retain
# non-zero EWMA weights for months, inflating the effective N from ~35 to ~70+ and
# diluting per-instrument capital by ~40%. This pushes BTC/ETH target positions below
# their minimum lot sizes, zeroing them out and causing realized vol to be only ~38% of
# the 25% target. span=1 restores per-instrument weights to 1/K immediately on
# universe changes.
instrument_weight_ewma_span: 1

use_instrument_div_mult_estimates: True
use_forecast_scale_estimates: True
use_forecast_div_mult_estimates: True

# risk_overlay omitted intentionally — the portfolio.py get_risk_scalar() path does
# an exact date lookup that fails on jagged panels (instruments with different start dates).
# When risk_overlay is absent, get_risk_scalar() raises missingData and the code falls
# back to notional_position_without_risk_scalar, which is the correct jagged-safe path.
# Gross leverage is still bounded by the IDM cap (2.5×) and the vol target (25%).

data_acquisition:
  auto_discover: true
  dataset_path: data/dataset_538registry_6yr_jagged.parquet

pinned_instruments: []
banned_instruments: []

dynamic_universe:
  # Exchange filter: restrict top-K candidates to instruments listed on this exchange.
  # 'hyperliquid' → reads data/hyperliquid_instruments.json (fetch with
  #                  scripts/fetch_hyperliquid_instruments.py)
  # null / absent  → no filter (use all cost-eligible instruments)
  exchange_filter: hyperliquid

  # Stage 2 selection criterion
  # Options: 'adv' (liquidity-based, default) or 'forecast_magnitude' (signal-strength-based)
  selection_criterion: 'adv'

  # Stage 1 — Carver SR cost / history / vol gates
  max_sr_cost_per_trade: 0.01
  max_sr_cost_annual: 0.13
  stack_turnover: 15.0
  adv_window: 252
  fee_bps: 4.5
  vol_window: 63  # D4 sweep 2026-03-27: Calmar-peak at 63d (ΔSharpe +4.1%)

  # Minimum history configuration (OPTIMIZED: 15 days, validated 2026-02-20)
  # Previous: 365 days (Sharpe 0.95)
  # Current:  15 days (Sharpe 0.99, +3.88% improvement)
  # See: out/min_history_test/ANALYSIS_REPORT.md for full justification
  min_history_days_topk: 15  # TopK ADV calculation threshold
  min_history_rule_requirement: 'any_rule'  # DynamicUniverseManager mode (15 days)

  min_annual_vol: 0.20   # Rejects stablecoins and semi-pegged tokens

  # IVOL cap — exclude high-idiosyncratic-vol lottery tokens from universe
  # IVOL = annualised vol of (instrument return - cross-sectional median return)
  # Filter: exclude instruments above the Nth cross-sectional percentile each day.
  # Default off until sweep confirms benefit (sweep_ivol_cap.py).
  # Literature: lottery-preference effect in crypto (CRYPTO_MARKET_FACTORS_LIT_REVIEW.md §5)
  ivol_cap_enabled: false
  ivol_cap_percentile: 75  # exclude top 25% by IVOL (keep bottom 75%)
  ivol_window: 35          # rolling window (days), matches vol_window

  # Stage 2 — Top-K selection with hysteresis (criterion specified above)
  top_k: 30
  entry_buffer: 2
  exit_buffer: 10

  # Binance lot-size gate: exclude instruments whose minimum lot (in USD) exceeds
  # this value. Prevents counting instruments in K that can't be meaningfully sized.
  # 'auto' (default) = capital / K  (e.g. $10K / 30 = $333 per slot)
  # null / 0         = disabled
  # number           = explicit USD threshold
  max_lot_notional: 'auto'

  # Stage 2 method: 'adv' (default) or 'carver_static'
  # 'adv': top-K by liquidity (ADV) with hysteresis
  # 'carver_static': greedy correlation-aware selection (Carver Post 3)
  stage2_method: 'adv'

  # Carver static selection config (used when stage2_method: 'carver_static')
  carver_static:
    assumed_gross_sr: 0.5        # Assumed SR before costs for all instruments
    sr_tolerance: 0.90           # Stop adding when SR drops below 90% of peak
    correlation_window: 252      # Trailing days for correlation estimation
    correlation_shrinkage: 0.5   # Shrinkage toward identity (0=none, 1=full)
    min_instruments: 5           # Minimum instruments to select
    max_instruments: 40          # Maximum instruments to select
    rebalance_freq: 'ME'         # Rebalance frequency (ME = month end)
    hysteresis_buffer: 3         # Max add/remove per rebalance to limit churn

# ============================================================================
# TRADING RULES — 45 VARIATIONS
# ============================================================================

trading_rules:

  # --------------------------------------------------------------------------
  # DIVERGENT — EWMAC (5 variations)
  # function: systems.provided.rules.ewmac.ewmac_calc_vol
  # data: injects price automatically (no data: field needed)
  # --------------------------------------------------------------------------
  ewmac_4:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 4, Lslow: 16}
  ewmac_8:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 8, Lslow: 32}
  ewmac_16:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 16, Lslow: 64}
  ewmac_32:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 32, Lslow: 128}
  ewmac_64:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 64, Lslow: 256}

  # --------------------------------------------------------------------------
  # DIVERGENT — Breakout (6 variations, uses rolling close-price range)
  # --------------------------------------------------------------------------
  breakout_10:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 10}
  breakout_20:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 20}
  breakout_40:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 40}
  breakout_80:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 80}
  breakout_160:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 160}
  breakout_320:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 320}

  # --------------------------------------------------------------------------
  # DIVERGENT — Normmom (5 variations)
  # Cumulative vol-normalised return series, then EWMAC
  # --------------------------------------------------------------------------
  normmom_4:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 4}
  normmom_8:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 8}
  normmom_16:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 16}
  normmom_32:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 32}
  normmom_64:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # DIVERGENT — Accel (3 variations)
  # Acceleration of EWMAC signal
  # --------------------------------------------------------------------------
  accel_16:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 16}
  accel_32:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 32}
  accel_64:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # DIVERGENT — Assettrend (4 variations)
  # EWMAC of ADV-weighted crypto index; same signal for all instruments
  # --------------------------------------------------------------------------
  assettrend_8:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 8}
  assettrend_16:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 16}
  assettrend_32:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 32}
  assettrend_64:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # DIVERGENT — Relmomentum (4 variations)
  # Cross-sectional momentum relative to asset-class median
  # --------------------------------------------------------------------------
  relmomentum_10:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 10}
  relmomentum_20:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 20}
  relmomentum_40:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 40}
  relmomentum_80:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 80}

  # --------------------------------------------------------------------------
  # CONVERGENT — Cross-Sectional Mean Reversion (2 horizons)
  # Fades XS outperformance vs crypto-wide median over rolling horizon.
  # Carver (2017): negative correlation with trend rules → portfolio insurance.
  # Uses same data methods as relmomentum (get_normalised_price_*).
  # ewma_span defaults to horizon/4 (31d for cs_mr_125, 62d for cs_mr_250).
  # --------------------------------------------------------------------------
  cs_mr_125:
    function: systems.provided.rules.cs_mr.cross_sectional_mean_reversion
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 125}

  cs_mr_250:
    function: systems.provided.rules.cs_mr.cross_sectional_mean_reversion
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 250}

  # --------------------------------------------------------------------------
  # DIVERGENT — BTC Lead-Lag (2 variations)
  # Lagged BTC returns as predictive signal for alts (weight=0 for BTC)
  # --------------------------------------------------------------------------
  btc_lead_lag_1:
    function: systems.crypto_perps.rules.rule_library.btc_lead_lag
    data:
      - "data.get_btc_price"
      - "data.daily_prices"
    other_args: {lag_days: 1}
  btc_lead_lag_2:
    function: systems.crypto_perps.rules.rule_library.btc_lead_lag
    data:
      - "data.get_btc_price"
      - "data.daily_prices"
    other_args: {lag_days: 2}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-A — FundingCarry (4 variations)
  # Smoothed annualised funding rate, negated
  # --------------------------------------------------------------------------
  funding_carry_10:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 10}
  funding_carry_30:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 30}
  funding_carry_60:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 60}
  funding_carry_125:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 125}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-A — Relcarry (3 variations)
  # Funding relative to cross-sectional median (weight=0 for BTC)
  # --------------------------------------------------------------------------
  relcarry_30:
    function: systems.crypto_perps.rules.rule_library.relcarry
    data:
      - "data.get_funding_rate"
      - "data.get_cross_sectional_median_funding"
    other_args: {smooth_days: 30}
  relcarry_60:
    function: systems.crypto_perps.rules.rule_library.relcarry
    data:
      - "data.get_funding_rate"
      - "data.get_cross_sectional_median_funding"
    other_args: {smooth_days: 60}
  relcarry_125:
    function: systems.crypto_perps.rules.rule_library.relcarry
    data:
      - "data.get_funding_rate"
      - "data.get_cross_sectional_median_funding"
    other_args: {smooth_days: 125}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-A — FundingMR + FundingCrowd
  # Mean-reversion from extreme and persistent funding extremes
  # --------------------------------------------------------------------------
  funding_mr:
    function: systems.crypto_perps.rules.rule_library.funding_mr
    data:
      - "data.get_funding_rate"

  # Persistent funding crowding (weight 0.0 pending sweep)
  funding_crowd_5:
    function: systems.crypto_perps.rules.rule_library.funding_crowd
    data:
      - "data.get_funding_rate"
    other_args: {window: 60, threshold: 1.0, persist_days: 5}

  funding_crowd_10:
    function: systems.crypto_perps.rules.rule_library.funding_crowd
    data:
      - "data.get_funding_rate"
    other_args: {window: 60, threshold: 1.0, persist_days: 10}

  # LSR-based signals (weight 0.0 pending sweep_oi_lsr_weight.py)
  lsr_divergence:
    function: systems.crypto_perps.rules.rule_library.lsr_divergence
    data:
      - "data.get_toptrader_long_short_ratio"
      - "data.get_long_short_ratio"
    other_args: {window: 60}

  lsr_retail_crowding:
    function: systems.crypto_perps.rules.rule_library.lsr_retail_crowding
    data:
      - "data.get_long_short_ratio"
    other_args: {window: 60}

  # Crowd-deleveraging trend amplifier: sweep_crowd_deleverage_weight.py to find optimal weight
  crowd_deleverage_trend:
    function: systems.crypto_perps.rules.rule_library.crowd_deleverage_trend
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
      - "data.get_xs_vol_zscore"
      - "data.get_xs_oi_change_zscore"
    other_args: {fast_span: 16, slow_span: 64, window: 60}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — STreversal (3 variations)
  # Short-term price reversal
  # --------------------------------------------------------------------------
  streversal_1:
    function: systems.crypto_perps.rules.rule_library.streversal
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {horizon: 1}
  streversal_2:
    function: systems.crypto_perps.rules.rule_library.streversal
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {horizon: 2}
  streversal_3:
    function: systems.crypto_perps.rules.rule_library.streversal
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {horizon: 3}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — ReturnSkew (2 variations)
  # Negative rolling skewness, z-scored
  # --------------------------------------------------------------------------
  return_skew_20:
    function: systems.crypto_perps.rules.rule_library.return_skew
    data:
      - "data.daily_prices"
    other_args: {window: 20}
  return_skew_60:
    function: systems.crypto_perps.rules.rule_library.return_skew
    data:
      - "data.daily_prices"
    other_args: {window: 60}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — Mrinasset (1 variation)
  # Asset-class index deviation from 1000d MA — mean-reversion
  # Weight=0 in default profile; non-zero only for BTC and ETH
  # --------------------------------------------------------------------------
  mrinasset:
    function: systems.crypto_perps.rules.rule_library.mrinasset
    data:
      - "data.get_asset_class_index_price"
    other_args: {ma_window: 1000}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — Illiquidity (2 variations)
  # Rising Amihud illiquidity ratio → defensive short signal
  # --------------------------------------------------------------------------
  illiquidity_20:
    function: systems.crypto_perps.rules.rule_library.illiquidity
    data:
      - "data.daily_prices"
      - "data.get_adv_notional"
    other_args: {window: 20}
  illiquidity_60:
    function: systems.crypto_perps.rules.rule_library.illiquidity
    data:
      - "data.daily_prices"
      - "data.get_adv_notional"
    other_args: {window: 60}

  # --------------------------------------------------------------------------
  # DIVERGENT — ResidualMomentum (3 variations)
  # Macro-residualised momentum: EWMAC applied to cumulative OLS residuals
  # from 60d rolling regression on SPX, DXY, and 10Y yield changes.
  # Requires macro_data_path (data/macro_factors.parquet) to be loaded.
  # Weights set to 0.0 initially — validate IC before assigning budget.
  # --------------------------------------------------------------------------
  residual_momentum_16:
    function: systems.crypto_perps.rules.rule_library.residual_momentum
    data:
      - "data.daily_prices"
      - "data.get_spx_price"
      - "data.get_dxy_price"
      - "data.get_us10y_yield"
    other_args: {Lfast: 16, reg_window: 60}
  residual_momentum_32:
    function: systems.crypto_perps.rules.rule_library.residual_momentum
    data:
      - "data.daily_prices"
      - "data.get_spx_price"
      - "data.get_dxy_price"
      - "data.get_us10y_yield"
    other_args: {Lfast: 32, reg_window: 60}
  residual_momentum_64:
    function: systems.crypto_perps.rules.rule_library.residual_momentum
    data:
      - "data.daily_prices"
      - "data.get_spx_price"
      - "data.get_dxy_price"
      - "data.get_us10y_yield"
    other_args: {Lfast: 64, reg_window: 60}

  # --------------------------------------------------------------------------
  # DIVERGENT — SectorMomentum (3 variations)
  # Within-sector relative momentum using sector-specific ADV-weighted index.
  # Reuses the assettrend function — sector-specific index injected via data method.
  # Ex-self computation: each instrument's index excludes itself.
  # Requires data/sector_map.json (run scripts/build_sector_map.py once).
  # Returns NaN forecast for 'Other' instruments or if sector_map not loaded.
  # Sectors: L1, L2, DeFi, Meme, AI, Gaming, Infra, Exchange (≥3 members required)
  # --------------------------------------------------------------------------
  sector_momentum_10:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_sector_index_price"
    other_args: {Lfast: 10}
  sector_momentum_20:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_sector_index_price"
    other_args: {Lfast: 20}
  sector_momentum_40:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_sector_index_price"
    other_args: {Lfast: 40}

  # --------------------------------------------------------------------------
  # CROSS-SECTIONAL SIGNALS — Pre-computed in data layer, passed through unchanged
  # These 4 rules were previously additive sleeves in ForecastCombineGated.
  # Now proper Carver rules: forecast scalar ≈ 1.0 (signals already ±20).
  # Uncovered instruments return NaN → rule weight renormalized to 0 for that instrument.
  # --------------------------------------------------------------------------
  xs_carry:
    function: systems.crypto_perps.rules.rule_library.passthrough_forecast
    data:
      - "data.get_xs_carry_forecast"

  xs_activity:
    function: systems.crypto_perps.rules.rule_library.passthrough_forecast
    data:
      - "data.get_xs_activity_forecast"

  xs_val:
    function: systems.crypto_perps.rules.rule_library.passthrough_forecast
    data:
      - "data.get_xs_val_forecast"

  inter_sector:
    function: systems.crypto_perps.rules.rule_library.passthrough_forecast
    data:
      - "data.get_inter_sector_forecast"

  # --------------------------------------------------------------------------
  # TIME-SERIES SKEW — Carver (2020), posts 1–4
  # Rolling log-return skew, pooled cross-asset z-score normalisation, negated.
  # Instruments with more negative skew (vs cross-asset average) outperform over
  # next 3–12 months (SR differential ≈ 0.4 at 6-month horizon).
  # Signal is a z-score (NOT a ±20 XS rank); forecast scalar handles scaling.
  # Minimal overlap with β_down overlay (panel Spearman r = -0.09 to -0.14).
  # Three lookbacks: 90d (noisier), 180d (Carver's strongest), 365d (smoother).
  # --------------------------------------------------------------------------
  skew_abs_90:
    function: systems.crypto_perps.rules.rule_library.passthrough_forecast
    data:
      - "data.get_skew_abs_90_forecast"

  skew_abs_180:
    function: systems.crypto_perps.rules.rule_library.passthrough_forecast
    data:
      - "data.get_skew_abs_180_forecast"

  skew_abs_365:
    function: systems.crypto_perps.rules.rule_library.passthrough_forecast
    data:
      - "data.get_skew_abs_365_forecast"

  # --------------------------------------------------------------------------
  # TIME-SERIES SKEW RV — Carver (2020), relative-value variant
  # Daily cross-sectional normalization: subtract today's crypto-wide mean skew.
  # In Carver's multi-class futures universe _rv had r=0.54 with _abs (kept).
  # In our single-class crypto universe _rv = _cs; Carver found _cs r=0.95 with
  # _abs (dropped). Testing empirically to confirm whether it adds diversification.
  # --------------------------------------------------------------------------
  skew_rv_90:
    function: systems.crypto_perps.rules.rule_library.passthrough_forecast
    data:
      - "data.get_skew_rv_90_forecast"

  skew_rv_180:
    function: systems.crypto_perps.rules.rule_library.passthrough_forecast
    data:
      - "data.get_skew_rv_180_forecast"

  skew_rv_365:
    function: systems.crypto_perps.rules.rule_library.passthrough_forecast
    data:
      - "data.get_skew_rv_365_forecast"

  # --------------------------------------------------------------------------
  # BEHAVIORAL — Round-Number signals (2026-04-10)
  # stop-losses and take-profits cluster at 1-2-5 series price levels.
  # break: momentum burst after a level is crossed (sparse ~60-80% zeros).
  # prox:  continuous amplifier when price is within 3% of a round number.
  # --------------------------------------------------------------------------
  round_number_break_10:
    function: systems.crypto_perps.rules.rule_library.round_number_break
    data:
      - "data.daily_prices"
    other_args: {lookback: 10}

  round_number_break_20:
    function: systems.crypto_perps.rules.rule_library.round_number_break
    data:
      - "data.daily_prices"
    other_args: {lookback: 20}

  round_number_break_40:
    function: systems.crypto_perps.rules.rule_library.round_number_break
    data:
      - "data.daily_prices"
    other_args: {lookback: 40}

  round_number_prox:
    function: systems.crypto_perps.rules.rule_library.round_number_prox
    data:
      - "data.daily_prices"
    other_args: {proximity_pct: 0.03}

  # --------------------------------------------------------------------------
  # CARRY — Trend-Gated (Carver-compliant, 2026-03-06 refactor)
  # Gate baked into rule: returns 0 when sign(carry) ≠ sign(per-instrument EWMAC).
  # Goes through standard forecast scalar → weighted avg → FDM pipeline.
  # ~50% outputs are 0; walk-forward scalar compensates (Carver-correct behaviour).
  #
  # Prior architecture (additive sleeve in ForecastCombineGated) contributed to
  # mean |FC|=14.2 and cap hit=45.6%. Standard rules restore these to target range.
  #
  # vol_norm_carry_10/30/60 kept for reference (no longer in forecast_weights).
  # --------------------------------------------------------------------------
  gated_carry_10:
    function: systems.crypto_perps.rules.rule_library.gated_carry
    data:
      - "data.get_funding_rate"
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {carry_span: 10, trend_fast: 32, trend_slow: 128}

  gated_carry_30:
    function: systems.crypto_perps.rules.rule_library.gated_carry
    data:
      - "data.get_funding_rate"
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {carry_span: 30, trend_fast: 32, trend_slow: 128}

  gated_carry_60:
    function: systems.crypto_perps.rules.rule_library.gated_carry
    data:
      - "data.get_funding_rate"
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {carry_span: 60, trend_fast: 32, trend_slow: 128}

  gated_carry_90:
    function: systems.crypto_perps.rules.rule_library.gated_carry
    data:
      - "data.get_funding_rate"
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
