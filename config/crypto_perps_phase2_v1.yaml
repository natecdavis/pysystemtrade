# ============================================================================
# PHASE 2 CONFIG V1 - Cross-Section Expansion Research Baseline
# ============================================================================
# Created: 2026-01-26
# Dataset: data/example_crypto_perps_15x4yr.parquet (2021-2024, 15 instruments)
# Purpose: Validate system behavior at realistic cross-section (N=15)
# Non-goal: Rule tuning or optimization (defer to later)
# ============================================================================

system:
  capital: 5000.0
  vol_target_ann: 0.25
  gross_leverage_cap: 2.0
  idm_cap: 2.5
  min_position_frac: 0.03

universe:
  # EXPANDED: 15 instruments (Phase 1 was 5)
  layer_a_instruments:
    - BTCUSDT_PERP
    - ETHUSDT_PERP
    - BNBUSDT_PERP
    - SOLUSDT_PERP
    - XRPUSDT_PERP
    - LTCUSDT_PERP
    - EOSUSDT_PERP
    - DOTUSDT_PERP
    - LINKUSDT_PERP
    - ADAUSDT_PERP
    - DOGEUSDT_PERP
    - MATICUSDT_PERP
    - AVAXUSDT_PERP
    - UNIUSDT_PERP
    - BCHUSDT_PERP
  daily_min_adv_notional: 10000000.0
  min_adv_notional: 50000000.0
  min_history_days: 365

rules:
  ewmac_pairs:
    - [8, 32]
    - [16, 64]
  ewmac_vol_days: 35
  carry_fast_halflife: 3
  carry_slow_halflife: 30

forecasts:
  target_abs: 10.0
  cap: 20.0
  # NO CHANGES: Keep default equal weights (1/3 each)
  # rule_weights: null  # Defaults to equal weights

sizing:
  vol_days: 35

constraints:
  correlation_span: 60
  correlation_min_periods: 20

execution:
  buffer_frac: 0.1

output:
  equity_curve_file: "equity_curve.csv"
  positions_file: "positions.csv"
  pnl_breakdown_file: "pnl_breakdown.csv"
  write_diagnostics: true
  diagnostics_file: "diagnostics.parquet"

diagnostics:
  enabled: true  # For Phase 2 scaling analysis
