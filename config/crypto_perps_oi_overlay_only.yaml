# ============================================================================
# CRYPTO PERPS — COST-FILTERED 22-RULE CONFIG (WITH OPTIMIZED GATED CARRY)
# ============================================================================
# Created: 2026-02-17  |  Revised: 2026-02-20 (gated carry optimized)
# Purpose: Evidence-based rule trimming + trend-gated carry
# Optimized: carry_weight=1.0, threshold=0.5 (extended 8-weight sweep)
#
# Pass 1 (predictive accuracy audit): 45 → 26 rules
#   REMOVED — Carry family (negative IC when untreated)
#   REMOVED — Bad reversion (streversal_2/3, return_skew, mrinasset, illiquidity)
#   REMOVED — Slow trend rules (ewmac_64, normmom_64, breakout_320, relmomentum_80)
#
# Pass 2 (cost audit — forecast_turnover × SR/trade Carver test): 26 → 19 rules
#   Thresholds: SR/trade ≤ 0.01, Annual SR ≤ 0.13
#   Fleet SR/trade (BTC+ETH anchor): 0.0030
#
#   REMOVED — btc_lead_lag_1/2:  480 rt/yr, ratio 4.1–4.3×, 100% instruments fail
#                                 annual SR drag ~1.4 SR each — larger than full Sharpe
#   REMOVED — streversal_1:      424 rt/yr, ratio 3.75×, 100% fail, drag 1.26 SR
#   REMOVED — relmomentum_10:    132 rt/yr, 100% fail annual test on all 8 sample insts
#   REMOVED — breakout_10:       132 rt/yr, 100% fail annual test
#   REMOVED — ewmac_4:            77 rt/yr, 62% of instruments fail annual test
#   REMOVED — normmom_4:          68 rt/yr, 37% fail — removed to be conservative
#
# Pass 3 (gated carry addition): 19 → 22 rules
#   ADDED — Vol-normalized carry (3 rules, trend-gated)
#   Initial test: Sharpe 0.84 → 0.87 (w_c=0.2, th=1.0)
#   Optimized: Sharpe 0.84 → 0.95 (+13.1%, w_c=1.0, th=0.5)
#   Performance: CAGR 14.6% → 21.2% (+45.2%), Vol 18.3% → 23.0% (+25.7%)
#
# Rule Budget (22 rules, 6 trend families + 1 carry family):
#   EWMAC ×3:        ewmac_8, ewmac_16, ewmac_32         (5.556% each)
#   Breakout ×4:     breakout_20/40/80/160                (4.167% each)
#   Normmom ×3:      normmom_8, normmom_16, normmom_32   (5.556% each)
#   Accel ×3:        accel_16, accel_32, accel_64         (5.556% each)
#   Assettrend ×4:   assettrend_8/16/32/64               (4.167% each)
#   Relmomentum ×2:  relmomentum_20, relmomentum_40       (8.333% each)
#   Carry ×3:        vol_norm_carry_10/30/60             (1.000% each)
#
# Sum = (19 trend rules) + (3 carry rules @ 1% each) = 97% + 3% = 1.000
# ============================================================================

system:
  capital: 5000.0
  vol_target_ann: 0.25
  gross_leverage_cap: 2.0
  idm_cap: 2.5
  min_position_frac: 0.03
  allow_jagged: true

percentage_vol_target: 25.0
notional_trading_capital: 10000.0
min_notional_position: 25.0

use_instrument_div_mult_estimates: True
use_forecast_scale_estimates: True
use_forecast_div_mult_estimates: True

# risk_overlay omitted intentionally — the portfolio.py get_risk_scalar() path does
# an exact date lookup that fails on jagged panels (instruments with different start dates).
# When risk_overlay is absent, get_risk_scalar() raises missingData and the code falls
# back to notional_position_without_risk_scalar, which is the correct jagged-safe path.
# Gross leverage is still bounded by the IDM cap (2.5×) and the vol target (25%).

data_acquisition:
  auto_discover: true
  dataset_path: data/dataset_538registry_6yr_jagged.parquet

pinned_instruments: []
banned_instruments: []

dynamic_universe:
  # Stage 2 selection criterion
  # Options: 'adv' (liquidity-based, default) or 'forecast_magnitude' (signal-strength-based)
  selection_criterion: 'adv'

  # Stage 1 — Carver SR cost / history / vol gates
  max_sr_cost_per_trade: 0.01
  max_sr_cost_annual: 0.13
  stack_turnover: 15.0
  adv_window: 30
  fee_bps: 5
  vol_window: 35

  # Minimum history configuration (OPTIMIZED: 15 days, validated 2026-02-20)
  # Previous: 365 days (Sharpe 0.95)
  # Current:  15 days (Sharpe 0.99, +3.88% improvement)
  # See: out/min_history_test/ANALYSIS_REPORT.md for full justification
  min_history_days_topk: 15  # TopK ADV calculation threshold
  min_history_rule_requirement: 'any_rule'  # DynamicUniverseManager mode (15 days)

  min_annual_vol: 0.20   # Rejects stablecoins and semi-pegged tokens

  # Stage 2 — Top-K selection with hysteresis (criterion specified above)
  top_k: 30
  entry_buffer: 5
  exit_buffer: 10

# ============================================================================
# TRADING RULES — 45 VARIATIONS
# ============================================================================

trading_rules:

  # --------------------------------------------------------------------------
  # DIVERGENT — EWMAC (5 variations)
  # function: systems.provided.rules.ewmac.ewmac_calc_vol
  # data: injects price automatically (no data: field needed)
  # --------------------------------------------------------------------------
  ewmac_4:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 4, Lslow: 16}
  ewmac_8:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 8, Lslow: 32}
  ewmac_16:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 16, Lslow: 64}
  ewmac_32:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 32, Lslow: 128}
  ewmac_64:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 64, Lslow: 256}

  # --------------------------------------------------------------------------
  # DIVERGENT — Breakout (6 variations, uses rolling close-price range)
  # --------------------------------------------------------------------------
  breakout_10:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 10}
  breakout_20:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 20}
  breakout_40:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 40}
  breakout_80:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 80}
  breakout_160:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 160}
  breakout_320:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 320}

  # --------------------------------------------------------------------------
  # DIVERGENT — Normmom (5 variations)
  # Cumulative vol-normalised return series, then EWMAC
  # --------------------------------------------------------------------------
  normmom_4:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 4}
  normmom_8:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 8}
  normmom_16:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 16}
  normmom_32:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 32}
  normmom_64:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # DIVERGENT — Accel (3 variations)
  # Acceleration of EWMAC signal
  # --------------------------------------------------------------------------
  accel_16:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 16}
  accel_32:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 32}
  accel_64:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # DIVERGENT — Assettrend (4 variations)
  # EWMAC of ADV-weighted crypto index; same signal for all instruments
