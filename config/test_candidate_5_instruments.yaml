# TEST CONFIG: 5-INSTRUMENT CANDIDATE POOL (for faster testing)
data_acquisition:
  candidate_instruments:
    - BTCUSDT_PERP
    - ETHUSDT_PERP
    - BNBUSDT_PERP
    - SOLUSDT_PERP
    - XRPUSDT_PERP

system:
  capital: 5000.0
  vol_target_ann: 0.25
  gross_leverage_cap: 2.0
  idm_cap: 2.5
  min_position_frac: 0.03

universe:
  # TRADABLE: only first 2 instruments
  layer_a_instruments:
    - BTCUSDT_PERP
    - ETHUSDT_PERP
  daily_min_adv_notional: 10000000.0
  min_adv_notional: 50000000.0
  min_history_days: 365
  data_gap_days: 2
  forced_exit_days: 5
  banned_instruments: []

rules:
  ewmac_pairs:
    - [8, 32]
  ewmac_vol_days: 35
  carry_fast_halflife: 3
  carry_slow_halflife: 30

forecasts:
  target_abs: 10.0
  cap: 20.0

sizing:
  vol_days: 35

constraints:
  correlation_span: 60
  correlation_min_periods: 20

execution:
  buffer_frac: 0.1

costs:
  spread_estimate: 0.0005
  taker_fee_frac: 0.0004

output:
  equity_curve_file: "equity_curve.csv"
  positions_file: "positions.csv"
