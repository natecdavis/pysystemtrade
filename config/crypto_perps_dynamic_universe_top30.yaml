# ============================================================================
# 541 BINANCE PERPS - DYNAMIC UNIVERSE TOP-30 CONFIG
# ============================================================================
# Created: 2026-02-14
# Purpose: Production-ready config for 541 Binance perpetuals with top-K selection
# Registry: Auto-discover from CoinGecko (541 candidates)
# Tradable: Top-30 by liquidity (ADV) with hysteresis
# Based on: Phases 1-6 implementation (2026-02-13 to 2026-02-14)
# ============================================================================

system:
  capital: 5000.0  # Starting capital in USD
  vol_target_ann: 0.25  # Target annualized volatility (25%)
  gross_leverage_cap: 2.0  # Maximum gross leverage
  idm_cap: 2.5  # Maximum Instrument Diversification Multiplier
  min_position_frac: 0.03  # Minimum position fraction (3%)
  allow_jagged: true  # REQUIRED for dynamic universe (instruments vary over time)

# pysystemtrade PositionSizing reads these flat keys (not system.* nested keys)
percentage_vol_target: 25.0   # 25% annualized vol target
notional_trading_capital: 5000.0  # USD capital

# Walk-forward estimated IDM from instrument return correlations.
# dm_max: 2.5 cap and ewma_span: 125 smoothing come from defaults.yaml.
use_instrument_div_mult_estimates: True

# Walk-forward estimated forecast scalars, pooled across all instruments.
# Targets mean_abs_forecast=10; pool_instruments=True and backfill=True come from defaults.yaml.
use_forecast_scale_estimates: True

# Gross leverage cap at 2.0x. The other three risk overlay guards are disabled
# (set to 99999) so only the leverage limit is active.
risk_overlay:
  max_risk_leverage: 2.0
  max_risk_fraction_normal_risk: 99999
  max_risk_fraction_stdev_risk: 99999
  max_risk_limit_sum_abs_risk: 99999

# Data acquisition with registry auto-discovery (Phase 1-2)
data_acquisition:
  auto_discover: true  # Use 541 instruments from CoinGecko registry
  # Registry refresh: opportunistic (daily advisory workflow)
  # Registry location: envs/{env}/data/raw/metadata/discovered_candidate_instruments.json
  # Dataset: Jagged panel with 317 instruments, 6 years (2020-2026)
  dataset_path: data/dataset_538registry_6yr_jagged.parquet

# Instruments always included if Stage 1 cost-eligible (manual override of rank threshold).
# BANNED_FLATTEN overrides pins — hard exits are absolute.
pinned_instruments: []

# Instruments always excluded (hard exit, target=0, overrides everything including pins).
banned_instruments: []

# Dynamic universe parameters (Phases 3-5)
dynamic_universe:
  # Cost filters (Carver SR thresholds)
  max_sr_cost_per_trade: 0.01  # Maximum 1% of annual SR per trade
  max_sr_cost_annual: 0.13     # Maximum 13% of annual SR total
  stack_turnover: 15.0         # Expected turnover (round-trips/year) for stack
  adv_window: 30               # ADV calculation window (days)
  fee_bps: 5                   # One-way fee in basis points

  # Top-K selection with hysteresis (Phase 5)
  top_k: 30                    # Target tradable size (K=30)
  entry_buffer: 5              # Enter if rank <= 25 (conservative)
  exit_buffer: 10              # Exit if rank > 40 (permissive)
  min_history_days: 365        # Minimum data history to compute ADV

  # Lifecycle filtering (Phase 3)
  # Uses manifest: envs/{env}/data/datasets/*.manifest.json
  # Filters: before launch, after delisting, no data status

# Trading rules (lightweight for crypto)
trading_rules:
  ewmac8_32:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 8
      Lslow: 32
  ewmac16_64:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 16
      Lslow: 64
  ewmac32_128:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 32
      Lslow: 128

forecast_scalars:
  ewmac8_32: 5.3
  ewmac16_64: 2.65
  ewmac32_128: 1.91

forecast_weights:
  ewmac8_32: 0.4
  ewmac16_64: 0.35
  ewmac32_128: 0.25

forecast_cap: 20.0

sizing:
  vol_days: 35  # Volatility lookback for position sizing

constraints:
  correlation_span: 60  # EWMA correlation span (shorter for crypto)
  correlation_min_periods: 20  # Minimum periods for correlation

execution:
  buffer_frac: 0.1  # Trading buffer (10% of position volatility)

costs:
  spread_estimate: 0.0005  # 5 bps spread estimate (fallback if dynamic unavailable)
  taker_fee_frac: 0.0004  # 4 bps taker fee

output:
  equity_curve_file: "equity_curve.csv"
  positions_file: "positions.csv"
  pnl_breakdown_file: "pnl_breakdown.csv"
  write_diagnostics: true
  diagnostics_file: "diagnostics.parquet"

diagnostics:
  enabled: true

# ============================================================================
# WORKFLOW NOTES
# ============================================================================
# Monthly Maintenance:
#   1. Vision bulk download (NO VPN): scripts/download_vision_bulk.py
#   2. Tail update (VPN required): scripts/update_data_monthly.py
#   3. Rebuild dataset: scripts/build_example_dataset.py
#
# Daily Advisory:
#   1. VPN check: curl https://fapi.binance.com/fapi/v1/ping
#   2. Sync positions: scripts/sync_positions_file.py
#   3. Run advisory: scripts/run_live_advisory.py --skip-dataset-rebuild
#
# Production Safety:
#   1. Validate config: scripts/validate_config.py
#   2. Hard exits: delisted, API staleness >2d, banned_instruments
#   3. Reduce-only: instruments exiting universe cannot increase exposure
#
# See: docs/runbook_541_perps.md for complete operations guide
# ============================================================================
