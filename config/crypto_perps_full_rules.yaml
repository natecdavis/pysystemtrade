system:
  capital: 5000.0
  vol_target_ann: 0.25
  idm_cap: 2.5
  min_position_frac: 0.03
  allow_jagged: true
percentage_vol_target: 25.0
notional_trading_capital: 10000.0
min_notional_position: 10.0
instrument_weight_ewma_span: 1
use_instrument_div_mult_estimates: true
use_forecast_scale_estimates: true
use_forecast_div_mult_estimates: true
forecast_correlation_estimate:
  shrinkage_parameter: 0.3
data_acquisition:
  auto_discover: true
  dataset_path: data/dataset_sb_corrected_6yr_jagged.parquet
pinned_instruments: []
banned_instruments: []
dynamic_universe:
  selection_criterion: adv
  max_sr_cost_per_trade: 0.01
  max_sr_cost_annual: 0.13
  stack_turnover: 15.0
  adv_window: 252
  fee_bps: 4.5
  vol_window: 63
  min_history_days_topk: 15
  min_history_rule_requirement: any_rule
  min_annual_vol: 0.2
  ivol_cap_enabled: false
  ivol_cap_percentile: 75
  ivol_window: 35
  top_k: 30
  entry_buffer: 2
  exit_buffer: 10
  max_lot_notional: auto
  stage2_method: adv
  carver_static:
    assumed_gross_sr: 0.5
    sr_tolerance: 0.9
    correlation_window: 252
    correlation_shrinkage: 0.5
    min_instruments: 5
    max_instruments: 40
    rebalance_freq: ME
    hysteresis_buffer: 3
