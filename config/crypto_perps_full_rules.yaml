# ============================================================================
# CRYPTO PERPS — COST-FILTERED 22-RULE CONFIG (WITH OI OVERLAY + SECTOR SLEEVE)
# ============================================================================
# Created: 2026-02-17  |  Revised: 2026-02-21 (OI overlay adopted)
#                        Revised: 2026-02-28 (sector momentum additive sleeve ADOPTED)
# Purpose: Evidence-based rule trimming + trend-gated carry + OI regime overlay
#          + sector momentum additive sleeve
# Optimized: carry_weight=1.0, threshold=0.5, min_history=15d, OI overlay enabled
#            sector_weight=0.10 (additive, no budget taken from trend rules)
#
# Pass 1 (predictive accuracy audit): 45 → 26 rules
#   REMOVED — Carry family (negative IC when untreated)
#   REMOVED — Bad reversion (streversal_2/3, return_skew, mrinasset, illiquidity)
#   REMOVED — Slow trend rules (ewmac_64, normmom_64, breakout_320, relmomentum_80)
#
# Pass 2 (cost audit — forecast_turnover × SR/trade Carver test): 26 → 19 rules
#   Thresholds: SR/trade ≤ 0.01, Annual SR ≤ 0.13
#   Fleet SR/trade (BTC+ETH anchor): 0.0030
#
#   REMOVED — btc_lead_lag_1/2:  480 rt/yr, ratio 4.1–4.3×, 100% instruments fail
#                                 annual SR drag ~1.4 SR each — larger than full Sharpe
#   REMOVED — streversal_1:      424 rt/yr, ratio 3.75×, 100% fail, drag 1.26 SR
#   REMOVED — relmomentum_10:    132 rt/yr, 100% fail annual test on all 8 sample insts
#   REMOVED — breakout_10:       132 rt/yr, 100% fail annual test
#   REMOVED — ewmac_4:            77 rt/yr, 62% of instruments fail annual test
#   REMOVED — normmom_4:          68 rt/yr, 37% fail — removed to be conservative
#
# Pass 3 (gated carry addition): 19 → 22 rules (ADOPTED)
#   ADDED — Vol-normalized carry (3 rules, trend-gated)
#   Initial test: Sharpe 0.84 → 0.87 (w_c=0.2, th=1.0)
#   Optimized: Sharpe 0.84 → 0.95 (+13.1%, w_c=1.0, th=0.5)
#   Performance: CAGR 14.6% → 21.2% (+45.2%), Vol 18.3% → 23.0% (+25.7%)
#
# Pass 4 (sector momentum additive sleeve): ADOPTED (2026-02-28)
#   ADDED — Sector momentum (3 rules) as additive sleeve on top of trend+carry.
#   Budget-cutting approach (10% from trend) tested first → Sharpe -3.0% REJECTED.
#   IC audit: sector family IC@5d=0.087 (best family), sector_momentum_20 ranks #4/54.
#   Additive approach (sector_weight=0.10, no trend budget cut) → Sharpe +1.5% ADOPTED.
#   Implementation: ForecastCombineGated pulls sector forecasts directly from
#   ForecastScaleCap (±20 scale), averages 3 rules, adds sector_weight × avg.
#   Trend/carry weights completely untouched. Sector map: data/sector_map.json.
#   Result: Sharpe 0.99 → 1.006, CAGR 21.3% → 22.4%, Crisis 53.4% → 55.4%
#
# Rule Budget (22 rules, 7 families):
#   EWMAC ×3:           ewmac_8, ewmac_16, ewmac_32          (4.762% each)
#   Breakout ×4:        breakout_20/40/80/160                 (3.571% each)
#   Normmom ×3:         normmom_8, normmom_16, normmom_32    (4.762% each)
#   Accel ×3:           accel_16, accel_32, accel_64          (4.762% each)
#   Assettrend ×4:      assettrend_8/16/32/64                (3.571% each)
#   Relmomentum ×2:     relmomentum_20, relmomentum_40        (7.143% each)
#   ResidualMomentum ×3:resmom_16/32/64                      (4.762% each)
#   Carry ×3:           vol_norm_carry_10/30/60              (1.000% each, additive)
#   Sector ×3:          sector_momentum_10/20/40             (additive, w=0.10)
#
# Weight budget: 22 trend rules = 100% (sum=1.0) + carry = 3% additive + sector = 10% additive
# (ForecastCombine normalises trend; carry_weight and sector_weight control additive sleeves)
# ============================================================================

system:
  capital: 5000.0
  vol_target_ann: 0.25
  gross_leverage_cap: 2.0
  idm_cap: 2.5
  min_position_frac: 0.03
  allow_jagged: true

percentage_vol_target: 25.0
notional_trading_capital: 10000.0
min_notional_position: 25.0

use_instrument_div_mult_estimates: True
use_forecast_scale_estimates: True
use_forecast_div_mult_estimates: True

# risk_overlay omitted intentionally — the portfolio.py get_risk_scalar() path does
# an exact date lookup that fails on jagged panels (instruments with different start dates).
# When risk_overlay is absent, get_risk_scalar() raises missingData and the code falls
# back to notional_position_without_risk_scalar, which is the correct jagged-safe path.
# Gross leverage is still bounded by the IDM cap (2.5×) and the vol target (25%).

data_acquisition:
  auto_discover: true
  dataset_path: data/dataset_538registry_6yr_jagged.parquet

pinned_instruments: []
banned_instruments: []

dynamic_universe:
  # Stage 2 selection criterion
  # Options: 'adv' (liquidity-based, default) or 'forecast_magnitude' (signal-strength-based)
  selection_criterion: 'adv'

  # Stage 1 — Carver SR cost / history / vol gates
  max_sr_cost_per_trade: 0.01
  max_sr_cost_annual: 0.13
  stack_turnover: 15.0
  adv_window: 30
  fee_bps: 5
  vol_window: 35

  # Minimum history configuration (OPTIMIZED: 15 days, validated 2026-02-20)
  # Previous: 365 days (Sharpe 0.95)
  # Current:  15 days (Sharpe 0.99, +3.88% improvement)
  # See: out/min_history_test/ANALYSIS_REPORT.md for full justification
  min_history_days_topk: 15  # TopK ADV calculation threshold
  min_history_rule_requirement: 'any_rule'  # DynamicUniverseManager mode (15 days)

  min_annual_vol: 0.20   # Rejects stablecoins and semi-pegged tokens

  # Stage 2 — Top-K selection with hysteresis (criterion specified above)
  top_k: 30
  entry_buffer: 5
  exit_buffer: 10

# ============================================================================
# TRADING RULES — 45 VARIATIONS
# ============================================================================

trading_rules:

  # --------------------------------------------------------------------------
  # DIVERGENT — EWMAC (5 variations)
  # function: systems.provided.rules.ewmac.ewmac_calc_vol
  # data: injects price automatically (no data: field needed)
  # --------------------------------------------------------------------------
  ewmac_4:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 4, Lslow: 16}
  ewmac_8:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 8, Lslow: 32}
  ewmac_16:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 16, Lslow: 64}
  ewmac_32:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 32, Lslow: 128}
  ewmac_64:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 64, Lslow: 256}

  # --------------------------------------------------------------------------
  # DIVERGENT — Breakout (6 variations, uses rolling close-price range)
  # --------------------------------------------------------------------------
  breakout_10:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 10}
  breakout_20:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 20}
  breakout_40:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 40}
  breakout_80:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 80}
  breakout_160:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 160}
  breakout_320:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 320}

  # --------------------------------------------------------------------------
  # DIVERGENT — Normmom (5 variations)
  # Cumulative vol-normalised return series, then EWMAC
  # --------------------------------------------------------------------------
  normmom_4:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 4}
  normmom_8:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 8}
  normmom_16:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 16}
  normmom_32:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 32}
  normmom_64:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # DIVERGENT — Accel (3 variations)
  # Acceleration of EWMAC signal
  # --------------------------------------------------------------------------
  accel_16:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 16}
  accel_32:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 32}
  accel_64:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # DIVERGENT — Assettrend (4 variations)
  # EWMAC of ADV-weighted crypto index; same signal for all instruments
  # --------------------------------------------------------------------------
  assettrend_8:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 8}
  assettrend_16:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 16}
  assettrend_32:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 32}
  assettrend_64:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # DIVERGENT — Relmomentum (4 variations)
  # Cross-sectional momentum relative to asset-class median
  # --------------------------------------------------------------------------
  relmomentum_10:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 10}
  relmomentum_20:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 20}
  relmomentum_40:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 40}
  relmomentum_80:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 80}

  # --------------------------------------------------------------------------
  # DIVERGENT — BTC Lead-Lag (2 variations)
  # Lagged BTC returns as predictive signal for alts (weight=0 for BTC)
  # --------------------------------------------------------------------------
  btc_lead_lag_1:
    function: systems.crypto_perps.rules.rule_library.btc_lead_lag
    data:
      - "data.get_btc_price"
      - "data.daily_prices"
    other_args: {lag_days: 1}
  btc_lead_lag_2:
    function: systems.crypto_perps.rules.rule_library.btc_lead_lag
    data:
      - "data.get_btc_price"
      - "data.daily_prices"
    other_args: {lag_days: 2}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-A — FundingCarry (4 variations)
  # Smoothed annualised funding rate, negated
  # --------------------------------------------------------------------------
  funding_carry_10:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 10}
  funding_carry_30:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 30}
  funding_carry_60:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 60}
  funding_carry_125:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 125}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-A — Relcarry (3 variations)
  # Funding relative to cross-sectional median (weight=0 for BTC)
  # --------------------------------------------------------------------------
  relcarry_30:
    function: systems.crypto_perps.rules.rule_library.relcarry
    data:
      - "data.get_funding_rate"
      - "data.get_cross_sectional_median_funding"
    other_args: {smooth_days: 30}
  relcarry_60:
    function: systems.crypto_perps.rules.rule_library.relcarry
    data:
      - "data.get_funding_rate"
      - "data.get_cross_sectional_median_funding"
    other_args: {smooth_days: 60}
  relcarry_125:
    function: systems.crypto_perps.rules.rule_library.relcarry
    data:
      - "data.get_funding_rate"
      - "data.get_cross_sectional_median_funding"
    other_args: {smooth_days: 125}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-A — FundingMR (1 variation)
  # Mean-reversion from extreme funding rate z-scores
  # --------------------------------------------------------------------------
  funding_mr:
    function: systems.crypto_perps.rules.rule_library.funding_mr
    data:
      - "data.get_funding_rate"

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — STreversal (3 variations)
  # Short-term price reversal
  # --------------------------------------------------------------------------
  streversal_1:
    function: systems.crypto_perps.rules.rule_library.streversal
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {horizon: 1}
  streversal_2:
    function: systems.crypto_perps.rules.rule_library.streversal
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {horizon: 2}
  streversal_3:
    function: systems.crypto_perps.rules.rule_library.streversal
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {horizon: 3}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — ReturnSkew (2 variations)
  # Negative rolling skewness, z-scored
  # --------------------------------------------------------------------------
  return_skew_20:
    function: systems.crypto_perps.rules.rule_library.return_skew
    data:
      - "data.daily_prices"
    other_args: {window: 20}
  return_skew_60:
    function: systems.crypto_perps.rules.rule_library.return_skew
    data:
      - "data.daily_prices"
    other_args: {window: 60}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — Mrinasset (1 variation)
  # Asset-class index deviation from 1000d MA — mean-reversion
  # Weight=0 in default profile; non-zero only for BTC and ETH
  # --------------------------------------------------------------------------
  mrinasset:
    function: systems.crypto_perps.rules.rule_library.mrinasset
    data:
      - "data.get_asset_class_index_price"
    other_args: {ma_window: 1000}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — Illiquidity (2 variations)
  # Rising Amihud illiquidity ratio → defensive short signal
  # --------------------------------------------------------------------------
  illiquidity_20:
    function: systems.crypto_perps.rules.rule_library.illiquidity
    data:
      - "data.daily_prices"
      - "data.get_adv_notional"
    other_args: {window: 20}
  illiquidity_60:
    function: systems.crypto_perps.rules.rule_library.illiquidity
    data:
      - "data.daily_prices"
      - "data.get_adv_notional"
    other_args: {window: 60}

  # --------------------------------------------------------------------------
  # DIVERGENT — ResidualMomentum (3 variations)
  # Macro-residualised momentum: EWMAC applied to cumulative OLS residuals
  # from 60d rolling regression on SPX, DXY, and 10Y yield changes.
  # Requires macro_data_path (data/macro_factors.parquet) to be loaded.
  # Weights set to 0.0 initially — validate IC before assigning budget.
  # --------------------------------------------------------------------------
  residual_momentum_16:
    function: systems.crypto_perps.rules.rule_library.residual_momentum
    data:
      - "data.daily_prices"
      - "data.get_spx_price"
      - "data.get_dxy_price"
      - "data.get_us10y_yield"
    other_args: {Lfast: 16, reg_window: 60}
  residual_momentum_32:
    function: systems.crypto_perps.rules.rule_library.residual_momentum
    data:
      - "data.daily_prices"
      - "data.get_spx_price"
      - "data.get_dxy_price"
      - "data.get_us10y_yield"
    other_args: {Lfast: 32, reg_window: 60}
  residual_momentum_64:
    function: systems.crypto_perps.rules.rule_library.residual_momentum
    data:
      - "data.daily_prices"
      - "data.get_spx_price"
      - "data.get_dxy_price"
      - "data.get_us10y_yield"
    other_args: {Lfast: 64, reg_window: 60}

  # --------------------------------------------------------------------------
  # DIVERGENT — SectorMomentum (3 variations)
  # Within-sector relative momentum using sector-specific ADV-weighted index.
  # Reuses the assettrend function — sector-specific index injected via data method.
  # Ex-self computation: each instrument's index excludes itself.
  # Requires data/sector_map.json (run scripts/build_sector_map.py once).
  # Returns NaN forecast for 'Other' instruments or if sector_map not loaded.
  # Sectors: L1, L2, DeFi, Meme, AI, Gaming, Infra, Exchange (≥3 members required)
  # --------------------------------------------------------------------------
  sector_momentum_10:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_sector_index_price"
    other_args: {Lfast: 10}
  sector_momentum_20:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_sector_index_price"
    other_args: {Lfast: 20}
  sector_momentum_40:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_sector_index_price"
    other_args: {Lfast: 40}

  # --------------------------------------------------------------------------
  # CARRY — Vol-Normalized (3 variations, EXPERIMENTAL)
  # Vol-normalized funding carry with trend-gating (disabled by default)
  # Previous carry rules had negative IC (IC@5d = -0.009) and were excluded.
  # This implementation uses trend-gating to only allow carry when it agrees
  # with trend direction, acting as confirmation signal rather than independent alpha.
  # --------------------------------------------------------------------------
  vol_norm_carry_10:
    function: systems.crypto_perps.rules.rule_library.vol_normalized_carry
    data:
      - "data.get_funding_rate"
      - "rawdata.daily_returns_volatility"
    other_args: {smooth_days: 10, vol_floor: 0.01}

  vol_norm_carry_30:
    function: systems.crypto_perps.rules.rule_library.vol_normalized_carry
    data:
      - "data.get_funding_rate"
      - "rawdata.daily_returns_volatility"
    other_args: {smooth_days: 30, vol_floor: 0.01}

  vol_norm_carry_60:
    function: systems.crypto_perps.rules.rule_library.vol_normalized_carry
    data:
      - "data.get_funding_rate"
      - "rawdata.daily_returns_volatility"
    other_args: {smooth_days: 60, vol_floor: 0.01}

# ============================================================================
# FORECAST WEIGHTS — DEFAULT PROFILE  (22 trend rules, 7 families)
# ============================================================================
# 7 families, equal family budget (1/7 each), equal weight within family.
# Carry stays fixed at 1% each (3% total, additive via ForecastCombineGated).
#
# IC audit results (15 sample instruments, dataset_538registry_6yr_jagged):
#   resmom    IC@5d=0.0767  t=2.8  ← #1 family (beats all trend families)
#   trend     IC@5d=0.0554  t=2.1
#   carry     IC@5d=-0.009         ← excluded (negative IC, per previous audit)
#   reversion IC@5d=-0.018         ← excluded (negative IC, per previous audit)
#
# Sector momentum (tested 2026-02-28): Sharpe 0.96 vs 0.99 baseline (-3.0%) → REJECTED
# Root cause: top-K dynamic portfolio (~30 instruments) has 0-5 members per sector;
# most sector indices return NaN, wasting the budget taken from trend rules.
#
# Budget allocation:
#   22 trend rules = 1/7 per family = 100% total
#   vol_norm_carry_10/30/60: 1.000% each (additive, gated by carry_weight param)
# ============================================================================

forecast_weights:
  # EWMAC: 3 rules × 4.762% = 14.286%
  # (ewmac_4 removed: 77 rt/yr, 62% instruments fail annual SR cost test)
  ewmac_8:   0.047619
  ewmac_16:  0.047619
  ewmac_32:  0.047619

  # Breakout: 4 rules × 3.571% = 14.284%
  # (breakout_10 removed: 132 rt/yr, 100% fail)
  breakout_20:  0.035714
  breakout_40:  0.035714
  breakout_80:  0.035714
  breakout_160: 0.035714

  # Normmom: 3 rules × 4.762% = 14.286%
  # (normmom_4 removed: 68 rt/yr, 37% fail)
  normmom_8:   0.047619
  normmom_16:  0.047619
  normmom_32:  0.047619

  # Accel: 3 rules × 4.762% = 14.286%
  accel_16:  0.047619
  accel_32:  0.047619
  accel_64:  0.047619

  # Assettrend: 4 rules × 3.571% = 14.284%
  assettrend_8:  0.035714
  assettrend_16: 0.035714
  assettrend_32: 0.035714
  assettrend_64: 0.035714

  # Relmomentum: 2 rules × 7.143% = 14.286%
  # (relmomentum_10 removed: 132 rt/yr, 100% fail)
  relmomentum_20: 0.071429
  relmomentum_40: 0.071429

  # ResidualMomentum: 3 rules × 4.762% = 14.286%
  # IC audit 2026-02-18: resmom is #1 family (IC@5d=0.077, t=2.8, IC@21d=0.112)
  # Ranks: resmom_16=#7, resmom_32=#13, resmom_64=#14 out of 48 rules
  residual_momentum_16: 0.047619
  residual_momentum_32: 0.047619
  residual_momentum_64: 0.047619

  # SectorMomentum — TESTED & REJECTED (2026-02-28): Sharpe 0.96 vs 0.99 baseline (-3.0%)
  # Rules removed from weights. Code and data/sector_map.json preserved for future research.
  # sector_momentum_10: 0.0
  # sector_momentum_20: 0.0
  # sector_momentum_40: 0.0

  # Vol-Normalized Carry: 3 rules × 1.0% = 3.0% (ENABLED with trend-gating)
  # Traditional carry had negative IC (IC@5d = -0.009) due to fighting momentum
  # Trend-gating solved this: only allow carry when sign(carry) == sign(trend)
  # Optimized parameters: carry_weight=1.0, threshold=0.5 (from extended 8-weight sweep)
  # Performance: Sharpe 0.84 → 0.95 (+13.1%), CAGR 14.6% → 21.2% (+45.2%)
  vol_norm_carry_10:  0.01
  vol_norm_carry_30:  0.01
  vol_norm_carry_60:  0.01

  # Removed entirely (cost audit):
  #   btc_lead_lag_1/2: 480 rt/yr, annual drag ~1.4 SR each
  #   streversal_1:     424 rt/yr, annual drag 1.26 SR

forecast_cap: 20.0

# ============================================================================
# TREND-GATED CARRY CONFIGURATION
# ============================================================================
# Trend-gating logic for carry rules (disabled by default).
#
# When use_gated_carry: true:
#   1. Carry rules are percentile-ranked cross-sectionally
#   2. Carry is gated by trend strength: zeroed when |trend| < threshold
#   3. Carry is zeroed when sign(trend) ≠ sign(carry) (no fighting trend)
#   4. Carry is blended additively with weight w_c (optimal: 1.0)
#
# To enable gated carry testing:
#   1. Set use_gated_carry: true
#   2. Set carry rule weights > 0 (e.g., 0.01 each for 3% total)
#   3. Adjust carry_weight (additive blend weight, default 0.2)
#   4. Adjust carry_trend_gate_threshold (min trend strength, default 1.0)
# ============================================================================

use_gated_carry: true  # ENABLED: Trend-gated carry (Sharpe 0.84 → 0.95)

# Additive weight for carry sleeve (applied AFTER gating)
# Optimal value from extended sweep: 1.0 (tested 0.3, 0.5, 1.0, 1.5, 2.0, 3.0, 4.0, 4.76)
carry_weight: 1.0

# Minimum absolute trend strength to allow carry
# |trend| < threshold → carry zeroed (weak trend)
# Optimal value from parameter sweep: 0.5 (tested 0.5, 1.0, 1.5, 2.0)
carry_trend_gate_threshold: 0.5

# List of rules considered "trend" for gating logic
# (These are summed to calculate trend strength)
trend_rule_list:
  - ewmac_8
  - ewmac_16
  - ewmac_32
  - normmom_8
  - normmom_16
  - normmom_32
  - breakout_20
  - breakout_40
  - breakout_80
  - breakout_160
  - accel_16
  - accel_32
  - accel_64
  - assettrend_8
  - assettrend_16
  - assettrend_32
  - assettrend_64
  - relmomentum_20
  - relmomentum_40
  - residual_momentum_16
  - residual_momentum_32
  - residual_momentum_64

# List of rules considered "carry" for gating logic
# (These are percentile-ranked and gated by trend)
carry_rule_list:
  - vol_norm_carry_10
  - vol_norm_carry_30
  - vol_norm_carry_60

# Additive sector momentum sleeve (no budget taken from trend rules)
# Added AFTER trend+carry combination: final += sector_weight × mean(sector_forecasts)
# sector_forecasts are pulled directly from ForecastScaleCap (±20 scale, already capped)
# IC audit (2026-02-28): sector family IC@5d=0.087, IC@21d=0.155 — ranks #1 family
# sector_weight: effective fractional contribution relative to avg trend forecast (~5 units)
#   0.05 → ~5% additive  |  0.10 → ~10% additive  |  0.20 → ~20% additive
sector_rule_list:
  - sector_momentum_10
  - sector_momentum_20
  - sector_momentum_40

sector_weight: 0.0  # PAUSED: additive test passed (+1.5% Sharpe) but reverted for simplicity

# ============================================================================
# OI REGIME OVERLAY CONFIGURATION (PHASE 1 - ADOPTED 2026-02-21)
# ============================================================================
# Defensive position scaling based on funding rate z-score (OI proxy).
#
# When use_oi_overlay: true:
#   - Positions are scaled down when |funding_z_score| > threshold
#   - High positive/negative funding → crowded positioning → cascade risk
#   - Multiplier range: [min_scale, 1.0]
#
# Phase 1 (Standard Overlay): Uses funding_rate as OI proxy
# Phase 1.5 (Trend-Aware): Tested and REJECTED (worse than standard)
# Phase 2 (Future): True OI/Volume ratio (optional enhancement)
#
# ADOPTION DECISION (2026-02-21):
# ✅ Standard overlay ADOPTED based on acute crash analysis
# ❌ Trend-aware overlay REJECTED (no improvement vs standard)
#
# Performance (6-year backtest, 2020-2026):
#   Sharpe:          0.9879 (baseline) → 0.9933 (standard) = +0.55% ✅
#   Annual Vol:      22.42% (baseline) → 21.55% (standard) = -3.9% ✅
#   Max DD:          -23.72% (baseline) → -22.59% (standard) = +1.1% ✅
#   Turnover:        15.35x (baseline) → 18.28x (standard) = +19.1% ⚠️
#   Transaction Cost: 45 bps/yr (baseline) → 54 bps/yr (standard) = +21% ⚠️
#
# Acute Crash Protection (3 events: May 2021, June 2022, Nov 2022):
#   Average return delta: +0.59% vs baseline ✅
#   Crash wins: 2 out of 3 events ✅
#   Drawdown improvement: ALL 3 events (+0.41% avg) ✅
#
# Analysis: out/oi_trend_aware/ACUTE_CRASH_FINDINGS.md
# ============================================================================

use_oi_overlay: true  # ENABLED: Standard overlay (ADOPTED 2026-02-21)

# OI overlay parameters (only used when use_oi_overlay: true)
oi_overlay_params:
  mode: funding          # Phase 1 proxy retained: Phase 2 OI/Volume tested, no improvement
  lookback: 90           # Rolling window for funding z-score (days)
  threshold: 2.0         # Z-score threshold where scaling begins (σ units)
  min_scale: 0.5         # Minimum position multiplier (0.5 = max 50% reduction)
  trend_aware: false     # DISABLED: Trend-aware mode (rejected after testing)

# ============================================================================
# SIZING AND CONSTRAINTS
# ============================================================================

sizing:
  vol_days: 35

constraints:
  correlation_span: 60
  correlation_min_periods: 20

execution:
  buffer_frac: 0.1

costs:
  spread_estimate: 0.0005
  taker_fee_frac: 0.0005

output:
  equity_curve_file: "equity_curve.csv"
  positions_file: "positions.csv"
  pnl_breakdown_file: "pnl_breakdown.csv"
  write_diagnostics: true
  diagnostics_file: "diagnostics.parquet"

diagnostics:
  enabled: true

