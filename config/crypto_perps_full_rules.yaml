# ============================================================================
# CRYPTO PERPS — COST-FILTERED 19-RULE CONFIG
# ============================================================================
# Created: 2026-02-17  |  Revised: 2026-02-17 (cost audit)
# Purpose: Evidence-based rule trimming — two audit passes
#
# Pass 1 (predictive accuracy audit): 45 → 26 rules
#   REMOVED — Carry family (zero IC at all horizons)
#   REMOVED — Bad reversion (streversal_2/3, return_skew, mrinasset, illiquidity)
#   REMOVED — Slow trend rules (ewmac_64, normmom_64, breakout_320, relmomentum_80)
#
# Pass 2 (cost audit — forecast_turnover × SR/trade Carver test): 26 → 19 rules
#   Thresholds: SR/trade ≤ 0.01, Annual SR ≤ 0.13
#   Fleet SR/trade (BTC+ETH anchor): 0.0030
#
#   REMOVED — btc_lead_lag_1/2:  480 rt/yr, ratio 4.1–4.3×, 100% instruments fail
#                                 annual SR drag ~1.4 SR each — larger than full Sharpe
#   REMOVED — streversal_1:      424 rt/yr, ratio 3.75×, 100% fail, drag 1.26 SR
#   REMOVED — relmomentum_10:    132 rt/yr, 100% fail annual test on all 8 sample insts
#   REMOVED — breakout_10:       132 rt/yr, 100% fail annual test
#   REMOVED — ewmac_4:            77 rt/yr, 62% of instruments fail annual test
#   REMOVED — normmom_4:          68 rt/yr, 37% fail — removed to be conservative
#
# Rule Budget (19 rules, 6 families × 16.667% each, equal within family):
#   EWMAC ×3:        ewmac_8, ewmac_16, ewmac_32         (5.556% each)
#   Breakout ×4:     breakout_20/40/80/160                (4.167% each)
#   Normmom ×3:      normmom_8, normmom_16, normmom_32   (5.556% each)
#   Accel ×3:        accel_16, accel_32, accel_64         (5.556% each)
#   Assettrend ×4:   assettrend_8/16/32/64               (4.167% each)
#   Relmomentum ×2:  relmomentum_20, relmomentum_40       (8.333% each)
#
# Sum = 9×(1/18) + 8×(1/24) + 2×(1/12) = 1/2 + 1/3 + 1/6 = 1.000
# ============================================================================

system:
  capital: 5000.0
  vol_target_ann: 0.25
  gross_leverage_cap: 2.0
  idm_cap: 2.5
  min_position_frac: 0.03
  allow_jagged: true

percentage_vol_target: 25.0
notional_trading_capital: 5000.0

use_instrument_div_mult_estimates: True
use_forecast_scale_estimates: True
use_forecast_div_mult_estimates: True

# risk_overlay omitted intentionally — the portfolio.py get_risk_scalar() path does
# an exact date lookup that fails on jagged panels (instruments with different start dates).
# When risk_overlay is absent, get_risk_scalar() raises missingData and the code falls
# back to notional_position_without_risk_scalar, which is the correct jagged-safe path.
# Gross leverage is still bounded by the IDM cap (2.5×) and the vol target (25%).

data_acquisition:
  auto_discover: true
  dataset_path: data/dataset_538registry_6yr_jagged.parquet

pinned_instruments: []
banned_instruments: []

dynamic_universe:
  max_sr_cost_per_trade: 0.01
  max_sr_cost_annual: 0.13
  stack_turnover: 15.0
  adv_window: 30
  fee_bps: 5
  top_k: 30
  entry_buffer: 5
  exit_buffer: 10
  min_history_days: 365

# ============================================================================
# TRADING RULES — 45 VARIATIONS
# ============================================================================

trading_rules:

  # --------------------------------------------------------------------------
  # DIVERGENT — EWMAC (5 variations)
  # function: systems.provided.rules.ewmac.ewmac_calc_vol
  # data: injects price automatically (no data: field needed)
  # --------------------------------------------------------------------------
  ewmac_4:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 4, Lslow: 16}
  ewmac_8:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 8, Lslow: 32}
  ewmac_16:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 16, Lslow: 64}
  ewmac_32:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 32, Lslow: 128}
  ewmac_64:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 64, Lslow: 256}

  # --------------------------------------------------------------------------
  # DIVERGENT — Breakout (6 variations, uses rolling close-price range)
  # --------------------------------------------------------------------------
  breakout_10:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 10}
  breakout_20:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 20}
  breakout_40:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 40}
  breakout_80:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 80}
  breakout_160:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 160}
  breakout_320:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 320}

  # --------------------------------------------------------------------------
  # DIVERGENT — Normmom (5 variations)
  # Cumulative vol-normalised return series, then EWMAC
  # --------------------------------------------------------------------------
  normmom_4:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 4}
  normmom_8:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 8}
  normmom_16:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 16}
  normmom_32:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 32}
  normmom_64:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # DIVERGENT — Accel (3 variations)
  # Acceleration of EWMAC signal
  # --------------------------------------------------------------------------
  accel_16:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 16}
  accel_32:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 32}
  accel_64:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # DIVERGENT — Assettrend (4 variations)
  # EWMAC of ADV-weighted crypto index; same signal for all instruments
  # --------------------------------------------------------------------------
  assettrend_8:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 8}
  assettrend_16:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 16}
  assettrend_32:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 32}
  assettrend_64:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # DIVERGENT — Relmomentum (4 variations)
  # Cross-sectional momentum relative to asset-class median
  # --------------------------------------------------------------------------
  relmomentum_10:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 10}
  relmomentum_20:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 20}
  relmomentum_40:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 40}
  relmomentum_80:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 80}

  # --------------------------------------------------------------------------
  # DIVERGENT — BTC Lead-Lag (2 variations)
  # Lagged BTC returns as predictive signal for alts (weight=0 for BTC)
  # --------------------------------------------------------------------------
  btc_lead_lag_1:
    function: systems.crypto_perps.rules.rule_library.btc_lead_lag
    data:
      - "data.get_btc_price"
      - "data.daily_prices"
    other_args: {lag_days: 1}
  btc_lead_lag_2:
    function: systems.crypto_perps.rules.rule_library.btc_lead_lag
    data:
      - "data.get_btc_price"
      - "data.daily_prices"
    other_args: {lag_days: 2}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-A — FundingCarry (4 variations)
  # Smoothed annualised funding rate, negated
  # --------------------------------------------------------------------------
  funding_carry_10:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 10}
  funding_carry_30:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 30}
  funding_carry_60:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 60}
  funding_carry_125:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 125}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-A — Relcarry (3 variations)
  # Funding relative to cross-sectional median (weight=0 for BTC)
  # --------------------------------------------------------------------------
  relcarry_30:
    function: systems.crypto_perps.rules.rule_library.relcarry
    data:
      - "data.get_funding_rate"
      - "data.get_cross_sectional_median_funding"
    other_args: {smooth_days: 30}
  relcarry_60:
    function: systems.crypto_perps.rules.rule_library.relcarry
    data:
      - "data.get_funding_rate"
      - "data.get_cross_sectional_median_funding"
    other_args: {smooth_days: 60}
  relcarry_125:
    function: systems.crypto_perps.rules.rule_library.relcarry
    data:
      - "data.get_funding_rate"
      - "data.get_cross_sectional_median_funding"
    other_args: {smooth_days: 125}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-A — FundingMR (1 variation)
  # Mean-reversion from extreme funding rate z-scores
  # --------------------------------------------------------------------------
  funding_mr:
    function: systems.crypto_perps.rules.rule_library.funding_mr
    data:
      - "data.get_funding_rate"

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — STreversal (3 variations)
  # Short-term price reversal
  # --------------------------------------------------------------------------
  streversal_1:
    function: systems.crypto_perps.rules.rule_library.streversal
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {horizon: 1}
  streversal_2:
    function: systems.crypto_perps.rules.rule_library.streversal
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {horizon: 2}
  streversal_3:
    function: systems.crypto_perps.rules.rule_library.streversal
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {horizon: 3}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — ReturnSkew (2 variations)
  # Negative rolling skewness, z-scored
  # --------------------------------------------------------------------------
  return_skew_20:
    function: systems.crypto_perps.rules.rule_library.return_skew
    data:
      - "data.daily_prices"
    other_args: {window: 20}
  return_skew_60:
    function: systems.crypto_perps.rules.rule_library.return_skew
    data:
      - "data.daily_prices"
    other_args: {window: 60}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — Mrinasset (1 variation)
  # Asset-class index deviation from 1000d MA — mean-reversion
  # Weight=0 in default profile; non-zero only for BTC and ETH
  # --------------------------------------------------------------------------
  mrinasset:
    function: systems.crypto_perps.rules.rule_library.mrinasset
    data:
      - "data.get_asset_class_index_price"
    other_args: {ma_window: 1000}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — Illiquidity (2 variations)
  # Rising Amihud illiquidity ratio → defensive short signal
  # --------------------------------------------------------------------------
  illiquidity_20:
    function: systems.crypto_perps.rules.rule_library.illiquidity
    data:
      - "data.daily_prices"
      - "data.get_adv_notional"
    other_args: {window: 20}
  illiquidity_60:
    function: systems.crypto_perps.rules.rule_library.illiquidity
    data:
      - "data.daily_prices"
      - "data.get_adv_notional"
    other_args: {window: 60}

# ============================================================================
# FORECAST WEIGHTS — DEFAULT PROFILE
# ============================================================================
# Budget: Divergent 70% / Conv-A 22.5% / Conv-B 7.5%
# 7 divergent families × 10% each; 3 conv-A families × 7.5% each
# 3 conv-B families × 2.5% each (mrinasset = 0 in default)
#
# Exact per-rule weights:
#   ewmac ×5:         10% / 5 = 2.000% each
#   breakout ×6:      10% / 6 = 1.667% each
#   normmom ×5:       10% / 5 = 2.000% each
#   accel ×3:         10% / 3 = 3.333% each
#   assettrend ×4:    10% / 4 = 2.500% each
#   relmomentum ×4:   10% / 4 = 2.500% each
#   btc_lead_lag ×2:  10% / 2 = 5.000% each
#   funding_carry ×4: 7.5% / 4 = 1.875% each
#   relcarry ×3:      7.5% / 3 = 2.500% each
#   funding_mr ×1:    7.5%
#   streversal ×3:    2.5% / 3 = 0.833% each
#   return_skew ×2:   2.5% / 2 = 1.250% each
#   mrinasset ×1:     0.000% (default — BTC/ETH override via future work)
#   illiquidity ×2:   2.5% / 2 = 1.250% each
#
# Sum = 5×0.02 + 6×0.016667 + 5×0.02 + 3×0.033333 + 4×0.025 + 4×0.025
#     + 2×0.05 + 4×0.01875 + 3×0.025 + 0.075 + 3×0.008333
#     + 2×0.0125 + 0 + 2×0.0125 ≈ 1.000
# ============================================================================

forecast_weights:
  # 6 families × 16.667% each, equal within family.
  # Rules not listed are computed but unused (zero effective weight).
  # 7 fast/high-turnover rules removed after cost audit (see header).

  # EWMAC: 3 rules × 5.556% = 16.667%
  # (ewmac_4 removed: 77 rt/yr, 62% instruments fail annual SR test)
  ewmac_8:   0.055556
  ewmac_16:  0.055556
  ewmac_32:  0.055556

  # Breakout: 4 rules × 4.167% = 16.667%
  # (breakout_10 removed: 132 rt/yr, 100% fail)
  breakout_20:  0.041667
  breakout_40:  0.041667
  breakout_80:  0.041667
  breakout_160: 0.041667

  # Normmom: 3 rules × 5.556% = 16.667%
  # (normmom_4 removed: 68 rt/yr, 37% fail)
  normmom_8:   0.055556
  normmom_16:  0.055556
  normmom_32:  0.055556

  # Accel: 3 rules × 5.556% = 16.667%
  accel_16:  0.055556
  accel_32:  0.055556
  accel_64:  0.055556

  # Assettrend: 4 rules × 4.167% = 16.667%
  assettrend_8:  0.041667
  assettrend_16: 0.041667
  assettrend_32: 0.041667
  assettrend_64: 0.041667

  # Relmomentum: 2 rules × 8.333% = 16.667%
  # (relmomentum_10 removed: 132 rt/yr, 100% fail)
  relmomentum_20: 0.083333
  relmomentum_40: 0.083333

  # Removed entirely (cost audit):
  #   btc_lead_lag_1/2: 480 rt/yr, annual drag ~1.4 SR each
  #   streversal_1:     424 rt/yr, annual drag 1.26 SR

forecast_cap: 20.0

# ============================================================================
# SIZING AND CONSTRAINTS
# ============================================================================

sizing:
  vol_days: 35

constraints:
  correlation_span: 60
  correlation_min_periods: 20

execution:
  buffer_frac: 0.1

costs:
  spread_estimate: 0.0005
  taker_fee_frac: 0.0004

output:
  equity_curve_file: "equity_curve.csv"
  positions_file: "positions.csv"
  pnl_breakdown_file: "pnl_breakdown.csv"
  write_diagnostics: true
  diagnostics_file: "diagnostics.parquet"

diagnostics:
  enabled: true

