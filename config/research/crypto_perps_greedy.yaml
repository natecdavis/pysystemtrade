# ============================================================================
# CRYPTO PERPS — MR GREEDY PORTFOLIO CONFIG
# ============================================================================
# Created: 2026-02-18
# Purpose: Minimum tracking error variance portfolio using greedy optimizer
#
# Key Changes vs Two-Stage System:
# - REMOVED: dynamic_universe section (no pre-filtering)
# - ADDED: greedy_params section (shadow_cost, buffer, covariance)
# - ALL instruments in universe are candidates; optimizer selects optimal subset
# - Typical result: 10-15 positions (vs 24 from two-stage)
# ============================================================================

system:
  capital: 5000.0
  vol_target_ann: 0.25
  gross_leverage_cap: 2.0
  idm_cap: 2.5
  min_position_frac: 0.03
  allow_jagged: true

percentage_vol_target: 25.0
notional_trading_capital: 10000.0
min_notional_position: 25.0

use_instrument_div_mult_estimates: True
use_forecast_scale_estimates: True
use_forecast_div_mult_estimates: True

# ============================================================================
# MR GREEDY PARAMETERS
# ============================================================================
greedy_params:
  # Shadow cost: trade-off between tracking error and transaction costs
  # Higher → fewer trades, more tracking error
  # Lower → more trades, less tracking error
  # Carver's futures value: 250
  # Crypto expected: 100-200 (higher correlation = less diversification benefit)
  shadow_cost: 100  # To be calibrated

  # Portfolio-level tracking error buffer (as fraction of portfolio vol)
  # Only trade if tracking_error > buffer
  # Carver's futures value: 0.0125 (1.25%)
  tracking_error_buffer: 0.0125

  # Covariance estimation
  # EWMA span for correlation matrix (days)
  correlation_span: 60

  # Minimum history required for covariance estimation
  min_history_days: 30

  # Constraints
  # No shorting for crypto
  long_only: true

  # Max position size (fraction of capital)
  max_position_fraction: 0.25

# ============================================================================
# DATA ACQUISITION
# ============================================================================
data_acquisition:
  auto_discover: true
  dataset_path: data/dataset_538registry_6yr_jagged.parquet

pinned_instruments: []
banned_instruments: []

# ============================================================================
# TRADING RULES — 19-RULE STACK (COST-FILTERED)
# ============================================================================
# Using cost-audited 19-rule stack from crypto_perps_full_rules.yaml
# Budget: 6 families × 16.667% each, equal within family
# ============================================================================

trading_rules:

  # --------------------------------------------------------------------------
  # DIVERGENT — EWMAC (3 variations)
  # 5.556% each
  # --------------------------------------------------------------------------
  ewmac_8:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 8, Lslow: 32}
  ewmac_16:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 16, Lslow: 64}
  ewmac_32:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 32, Lslow: 128}

  # --------------------------------------------------------------------------
  # DIVERGENT — BREAKOUT (4 variations)
  # 4.167% each
  # --------------------------------------------------------------------------
  breakout_20:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 20}
  breakout_40:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 40}
  breakout_80:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 80}
  breakout_160:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 160}

  # --------------------------------------------------------------------------
  # DIVERGENT — NORMMOM (3 variations)
  # 5.556% each
  # --------------------------------------------------------------------------
  normmom_8:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - 'get_normalised_price_this_instrument'
    other_args: {Lfast: 8, Lslow: 32}
  normmom_16:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - 'get_normalised_price_this_instrument'
    other_args: {Lfast: 16, Lslow: 64}
  normmom_32:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - 'get_normalised_price_this_instrument'
    other_args: {Lfast: 32, Lslow: 128}

  # --------------------------------------------------------------------------
  # CONVERGENT-A — ACCEL (3 variations)
  # 5.556% each
  # Note: accel automatically calculates Lslow = Lfast × 4
  # --------------------------------------------------------------------------
  accel_16:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 16}
  accel_32:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 32}
  accel_64:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # CONVERGENT-A — ASSETTREND (4 variations)
  # 4.167% each
  # --------------------------------------------------------------------------
  assettrend_8:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - 'get_asset_class_index_price'
    other_args: {Lfast: 8, Lslow: 32}
  assettrend_16:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - 'get_asset_class_index_price'
    other_args: {Lfast: 16, Lslow: 64}
  assettrend_32:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - 'get_asset_class_index_price'
    other_args: {Lfast: 32, Lslow: 128}
  assettrend_64:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - 'get_asset_class_index_price'
    other_args: {Lfast: 64, Lslow: 256}

  # --------------------------------------------------------------------------
  # CONVERGENT-B — RELMOMENTUM (2 variations)
  # 8.333% each
  # --------------------------------------------------------------------------
  relmomentum_20:
    function: systems.crypto_perps.rules.rule_library.relmomentum
    data:
      - 'get_cross_sectional_median_price'
    other_args: {Lfast: 20, Lslow: 80}
  relmomentum_40:
    function: systems.crypto_perps.rules.rule_library.relmomentum
    data:
      - 'get_cross_sectional_median_price'
    other_args: {Lfast: 40, Lslow: 160}

# ============================================================================
# FORECAST COMBINE — EQUAL WEIGHTS
# ============================================================================
forecast_weights:
  # EWMAC (3 rules × 5.556% = 16.667%)
  ewmac_8: 0.0556
  ewmac_16: 0.0556
  ewmac_32: 0.0556

  # Breakout (4 rules × 4.167% = 16.667%)
  breakout_20: 0.0417
  breakout_40: 0.0417
  breakout_80: 0.0417
  breakout_160: 0.0417

  # Normmom (3 rules × 5.556% = 16.667%)
  normmom_8: 0.0556
  normmom_16: 0.0556
  normmom_32: 0.0556

  # Accel (3 rules × 5.556% = 16.667%)
  accel_16: 0.0556
  accel_32: 0.0556
  accel_64: 0.0556

  # Assettrend (4 rules × 4.167% = 16.667%)
  assettrend_8: 0.0417
  assettrend_16: 0.0417
  assettrend_32: 0.0417
  assettrend_64: 0.0417

  # Relmomentum (2 rules × 8.333% = 16.667%)
  relmomentum_20: 0.0833
  relmomentum_40: 0.0833

# Sum check: 3×0.0556 + 4×0.0417 + 3×0.0556 + 3×0.0556 + 4×0.0417 + 2×0.0833
#          = 0.1668 + 0.1668 + 0.1668 + 0.1668 + 0.1668 + 0.1666
#          = 1.0006 (rounding to 1.0000)

# ============================================================================
# FORECAST SCALARS — USE WALK-FORWARD ESTIMATES
# ============================================================================
use_forecast_scale_estimates: True

# ============================================================================
# FDM — USE WALK-FORWARD ESTIMATES
# ============================================================================
use_forecast_div_mult_estimates: True

# ============================================================================
# IDM — USE WALK-FORWARD ESTIMATES
# ============================================================================
use_instrument_div_mult_estimates: True
