# ============================================================================
# 15-Instrument Phase 2 Config (Dynamic Universe)
# ============================================================================
# Created: 2026-01-26
# Dataset: 15 instruments (2020-2026 unified jagged)
# Purpose: Phase 2 backtest with dynamic Layer-A membership
# ============================================================================

system:
  capital: 5000.0
  vol_target_ann: 0.25
  gross_leverage_cap: 2.0
  idm_cap: 2.5
  min_position_frac: 0.03
  allow_jagged: true  # Enable jagged panel support for datasets with varying instrument lifecycles

universe:
  # All 15 instruments as candidate pool
  layer_a_instruments:
    - BTCUSDT_PERP
    - ETHUSDT_PERP
    - BNBUSDT_PERP
    - XRPUSDT_PERP
    - LTCUSDT_PERP
    - EOSUSDT_PERP
    - BCHUSDT_PERP
    - LINKUSDT_PERP
    - SOLUSDT_PERP
    - DOTUSDT_PERP
    - ADAUSDT_PERP
    - UNIUSDT_PERP
    - MATICUSDT_PERP
    - DOGEUSDT_PERP
    - AVAXUSDT_PERP

  # Phase 2: Dynamic universe settings
  review_freq: 'BMS'  # Business Month Start - first business day of month
  daily_min_adv_notional: 10000000.0  # $10M daily eligibility filter
  min_adv_notional: 50000000.0  # $50M Layer-A membership threshold (at reviews)
  min_history_days: 365  # Minimum data coverage for Layer-A (365 days)
  data_gap_days: 2  # Max consecutive missing days for daily eligibility
  forced_exit_days: 5  # Days to decay to 0 for INELIGIBLE_HOLD state
  banned_instruments: []

rules:
  ewmac_pairs:
    - [8, 32]
    - [16, 64]
  ewmac_vol_days: 35
  carry_fast_halflife: 3
  carry_slow_halflife: 30

forecasts:
  target_abs: 10.0
  cap: 20.0
  use_relative_momentum: false

sizing:
  vol_days: 35

costs:
  spread_estimate: 0.0005
  taker_fee_rate: 0.0004

execution:
  buffer_frac: 0.10

constraints:
  correlation_span: 60
  correlation_min_periods: 20

output:
  equity_curve_file: "equity_curve.csv"
  positions_file: "positions.csv"
  pnl_breakdown_file: "pnl_breakdown.csv"
  write_diagnostics: true
  diagnostics_file: "diagnostics.parquet"

diagnostics:
  enabled: true
