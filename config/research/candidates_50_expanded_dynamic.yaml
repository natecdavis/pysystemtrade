# ============================================================================
# DYNAMIC UNIVERSE CONFIG: 50-Instrument Pool (Tier 1+2+3+4)
# ============================================================================
# Purpose: Research ablation with monthly universe reviews (Phase 2)
# Dataset: research/datasets/candidates_49_extended.parquet
# Comparison: vs candidates_50_expanded.yaml (static universe)
# Note: Only 15 instruments have data going back to 2020 (excluding RENDERUSDT)
# ============================================================================

system:
  capital: 5000.0  # Starting capital in USD
  vol_target_ann: 0.25  # Target annualized volatility (25%)
  gross_leverage_cap: 2.0  # Maximum gross leverage
  idm_cap: 2.5  # Maximum Instrument Diversification Multiplier
  min_position_frac: 0.03  # Minimum position fraction (3%)
  allow_jagged: true  # Support jagged panels (instruments with different launch dates)

universe:
  # DYNAMIC SELECTOR ENABLED
  review_freq: 'BMS'  # Business Month Start (first business day of month)

  # Note: Only 15 instruments have data going back to 2020
  # Config lists all 49 desired instruments, but dataset only includes 15 with sufficient history
  # The system will only trade instruments present in the dataset
  layer_a_instruments:
    # Instruments with data in extended dataset (2020-2024)
    - BTCUSDT_PERP
    - ETHUSDT_PERP
    - BNBUSDT_PERP
    - SOLUSDT_PERP
    - XRPUSDT_PERP
    - LTCUSDT_PERP
    - BCHUSDT_PERP
    - LINKUSDT_PERP
    - DOTUSDT_PERP
    - ADAUSDT_PERP
    - UNIUSDT_PERP
    - DOGEUSDT_PERP
    - AVAXUSDT_PERP
    - EOSUSDT_PERP
    - MATICUSDT_PERP

  # Layer A eligibility (monthly reviews)
  min_adv_notional: 50000000.0  # $50M threshold at reviews
  min_history_days: 365  # 365-day history requirement (production-like)

  # Daily eligibility (Layer B)
  daily_min_adv_notional: 10000000.0  # $10M daily filter
  data_gap_days: 2  # Max consecutive missing days

  # State machine
  forced_exit_days: 5  # Days to decay to 0 for INELIGIBLE_HOLD
  banned_instruments: []

rules:
  # EWMAC pairs: [Lfast, Lslow]
  ewmac_pairs:
    - [8, 32]
    - [16, 64]
  ewmac_vol_days: 35  # Volatility lookback for EWMAC
  carry_fast_halflife: 3  # Fast EWMA half-life in days
  carry_slow_halflife: 30  # Slow EWMA half-life in days

forecasts:
  target_abs: 10.0  # Target mean absolute forecast
  cap: 20.0  # Forecast cap (±20)
  use_relative_momentum: false  # Disable cross-sectional momentum for Phase 1

sizing:
  vol_days: 35  # Volatility lookback for position sizing

constraints:
  correlation_span: 60  # EWMA correlation span
  correlation_min_periods: 20  # Minimum periods for correlation

execution:
  buffer_frac: 0.1  # Trading buffer (10% of position volatility)

costs:
  spread_estimate: 0.0005  # 5 bps spread estimate
  taker_fee_frac: 0.0004  # 4 bps taker fee

output:
  equity_curve_file: "equity_curve.csv"
  positions_file: "positions.csv"
  pnl_breakdown_file: "pnl_breakdown.csv"
  write_diagnostics: true
  diagnostics_file: "diagnostics.parquet"

diagnostics:
  enabled: true  # Must be true for layer_a_membership.csv
