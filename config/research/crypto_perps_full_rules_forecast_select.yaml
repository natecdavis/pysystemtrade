# ============================================================================
# CRYPTO PERPS — FORECAST-BASED STAGE 2 SELECTION (TEST CONFIG)
# ============================================================================
# Created: 2026-02-20
# Purpose: Test forecast-magnitude-based Stage 2 selection vs ADV-based
#
# CHANGE FROM BASE CONFIG (crypto_perps_full_rules.yaml):
#   - selection_criterion: 'forecast_magnitude' (instead of 'adv')
#
# Research Question: Does selecting top-K by |forecast| instead of by ADV
#                    improve risk-adjusted returns?
#
# All other parameters identical to crypto_perps_full_rules.yaml
# ============================================================================

system:
  capital: 5000.0
  vol_target_ann: 0.25
  gross_leverage_cap: 2.0
  idm_cap: 2.5
  min_position_frac: 0.03
  allow_jagged: true

percentage_vol_target: 25.0
notional_trading_capital: 10000.0
min_notional_position: 25.0

use_instrument_div_mult_estimates: True
use_forecast_scale_estimates: True
use_forecast_div_mult_estimates: True

# risk_overlay omitted intentionally — the portfolio.py get_risk_scalar() path does
# an exact date lookup that fails on jagged panels (instruments with different start dates).
# When risk_overlay is absent, get_risk_scalar() raises missingData and the code falls
# back to notional_position_without_risk_scalar, which is the correct jagged-safe path.
# Gross leverage is still bounded by the IDM cap (2.5×) and the vol target (25%).

data_acquisition:
  auto_discover: true
  dataset_path: data/dataset_538registry_6yr_jagged.parquet

pinned_instruments: []
banned_instruments: []

dynamic_universe:
  # *** TEST CHANGE: Use forecast magnitude instead of ADV ***
  # Stage 2 selection criterion
  # Options: 'adv' (liquidity-based) or 'forecast_magnitude' (signal-strength-based)
  selection_criterion: 'forecast_magnitude'

  # Stage 1 — Carver SR cost / history / vol gates
  max_sr_cost_per_trade: 0.01
  max_sr_cost_annual: 0.13
  stack_turnover: 15.0
  adv_window: 30
  fee_bps: 5
  vol_window: 35
  min_history_days: 365
  min_annual_vol: 0.20   # Rejects stablecoins and semi-pegged tokens

  # Stage 2 — Top-K selection with hysteresis (criterion specified above)
  top_k: 30
  entry_buffer: 5
  exit_buffer: 10

# ============================================================================
# TRADING RULES — 45 VARIATIONS
# ============================================================================

trading_rules:

  # --------------------------------------------------------------------------
  # DIVERGENT — EWMAC (5 variations)
  # function: systems.provided.rules.ewmac.ewmac_calc_vol
  # data: injects price automatically (no data: field needed)
  # --------------------------------------------------------------------------
  ewmac_4:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 4, Lslow: 16}
  ewmac_8:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 8, Lslow: 32}
  ewmac_16:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 16, Lslow: 64}
  ewmac_32:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 32, Lslow: 128}
  ewmac_64:
    function: systems.provided.rules.ewmac.ewmac_calc_vol
    other_args: {Lfast: 64, Lslow: 256}

  # --------------------------------------------------------------------------
  # DIVERGENT — Breakout (6 variations, uses rolling close-price range)
  # --------------------------------------------------------------------------
  breakout_10:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 10}
  breakout_20:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 20}
  breakout_40:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 40}
  breakout_80:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 80}
  breakout_160:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 160}
  breakout_320:
    function: systems.provided.rules.breakout.breakout
    other_args: {lookback: 320}

  # --------------------------------------------------------------------------
  # DIVERGENT — Normmom (5 variations)
  # Cumulative vol-normalised return series, then EWMAC
  # --------------------------------------------------------------------------
  normmom_4:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 4}
  normmom_8:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 8}
  normmom_16:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 16}
  normmom_32:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 32}
  normmom_64:
    function: systems.crypto_perps.rules.rule_library.normmom
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # DIVERGENT — Accel (3 variations)
  # Acceleration of EWMAC signal
  # --------------------------------------------------------------------------
  accel_16:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 16}
  accel_32:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 32}
  accel_64:
    function: systems.provided.rules.accel.accel
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # DIVERGENT — Assettrend (4 variations)
  # EWMAC of ADV-weighted crypto index; same signal for all instruments
  # --------------------------------------------------------------------------
  assettrend_8:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 8}
  assettrend_16:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 16}
  assettrend_32:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 32}
  assettrend_64:
    function: systems.crypto_perps.rules.rule_library.assettrend
    data:
      - "data.get_asset_class_index_price"
    other_args: {Lfast: 64}

  # --------------------------------------------------------------------------
  # DIVERGENT — Relmomentum (4 variations)
  # Cross-sectional momentum relative to asset-class median
  # --------------------------------------------------------------------------
  relmomentum_10:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 10}
  relmomentum_20:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 20}
  relmomentum_40:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 40}
  relmomentum_80:
    function: systems.provided.rules.rel_mom.relative_momentum
    data:
      - "data.get_normalised_price_this_instrument"
      - "data.get_normalised_price_for_asset_class"
    other_args: {horizon: 80}

  # --------------------------------------------------------------------------
  # DIVERGENT — BTC Lead-Lag (2 variations)
  # Lagged BTC returns as predictive signal for alts (weight=0 for BTC)
  # --------------------------------------------------------------------------
  btc_lead_lag_1:
    function: systems.crypto_perps.rules.rule_library.btc_lead_lag
    data:
      - "data.get_btc_price"
      - "data.daily_prices"
    other_args: {lag_days: 1}
  btc_lead_lag_2:
    function: systems.crypto_perps.rules.rule_library.btc_lead_lag
    data:
      - "data.get_btc_price"
      - "data.daily_prices"
    other_args: {lag_days: 2}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-A — FundingCarry (4 variations)
  # Smoothed annualised funding rate, negated
  # --------------------------------------------------------------------------
  funding_carry_10:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 10}
  funding_carry_30:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 30}
  funding_carry_60:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 60}
  funding_carry_125:
    function: systems.crypto_perps.rules.rule_library.funding_carry
    data:
      - "data.get_funding_rate"
    other_args: {smooth_days: 125}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-A — Relcarry (3 variations)
  # Funding relative to cross-sectional median (weight=0 for BTC)
  # --------------------------------------------------------------------------
  relcarry_30:
    function: systems.crypto_perps.rules.rule_library.relcarry
    data:
      - "data.get_funding_rate"
      - "data.get_cross_sectional_median_funding"
    other_args: {smooth_days: 30}
  relcarry_60:
    function: systems.crypto_perps.rules.rule_library.relcarry
    data:
      - "data.get_funding_rate"
      - "data.get_cross_sectional_median_funding"
    other_args: {smooth_days: 60}
  relcarry_125:
    function: systems.crypto_perps.rules.rule_library.relcarry
    data:
      - "data.get_funding_rate"
      - "data.get_cross_sectional_median_funding"
    other_args: {smooth_days: 125}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-A — FundingMR (1 variation)
  # Mean-reversion from extreme funding rate z-scores
  # --------------------------------------------------------------------------
  funding_mr:
    function: systems.crypto_perps.rules.rule_library.funding_mr
    data:
      - "data.get_funding_rate"

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — STreversal (3 variations)
  # Short-term price reversal
  # --------------------------------------------------------------------------
  streversal_1:
    function: systems.crypto_perps.rules.rule_library.streversal
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {horizon: 1}
  streversal_2:
    function: systems.crypto_perps.rules.rule_library.streversal
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {horizon: 2}
  streversal_3:
    function: systems.crypto_perps.rules.rule_library.streversal
    data:
      - "data.daily_prices"
      - "rawdata.daily_returns_volatility"
    other_args: {horizon: 3}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — ReturnSkew (2 variations)
  # Negative rolling skewness, z-scored
  # --------------------------------------------------------------------------
  return_skew_20:
    function: systems.crypto_perps.rules.rule_library.return_skew
    data:
      - "data.daily_prices"
    other_args: {window: 20}
  return_skew_60:
    function: systems.crypto_perps.rules.rule_library.return_skew
    data:
      - "data.daily_prices"
    other_args: {window: 60}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — Mrinasset (1 variation)
  # Asset-class index deviation from 1000d MA — mean-reversion
  # Weight=0 in default profile; non-zero only for BTC and ETH
  # --------------------------------------------------------------------------
  mrinasset:
    function: systems.crypto_perps.rules.rule_library.mrinasset
    data:
      - "data.get_asset_class_index_price"
    other_args: {ma_window: 1000}

  # --------------------------------------------------------------------------
  # CONVERGENT SUB-B — Illiquidity (2 variations)
  # Rising Amihud illiquidity ratio → defensive short signal
  # --------------------------------------------------------------------------
  illiquidity_20:
    function: systems.crypto_perps.rules.rule_library.illiquidity
    data:
      - "data.daily_prices"
      - "data.get_adv_notional"
    other_args: {window: 20}
  illiquidity_60:
    function: systems.crypto_perps.rules.rule_library.illiquidity
    data:
      - "data.daily_prices"
      - "data.get_adv_notional"
    other_args: {window: 60}

  # --------------------------------------------------------------------------
  # DIVERGENT — ResidualMomentum (3 variations)
  # Macro-residualised momentum: EWMAC applied to cumulative OLS residuals
  # from 60d rolling regression on SPX, DXY, and 10Y yield changes.
  # Requires macro_data_path (data/macro_factors.parquet) to be loaded.
  # Weights set to 0.0 initially — validate IC before assigning budget.
  # --------------------------------------------------------------------------
  residual_momentum_16:
    function: systems.crypto_perps.rules.rule_library.residual_momentum
    data:
      - "data.daily_prices"
      - "data.get_spx_price"
      - "data.get_dxy_price"
      - "data.get_us10y_yield"
    other_args: {Lfast: 16, reg_window: 60}
  residual_momentum_32:
    function: systems.crypto_perps.rules.rule_library.residual_momentum
    data:
      - "data.daily_prices"
      - "data.get_spx_price"
      - "data.get_dxy_price"
      - "data.get_us10y_yield"
    other_args: {Lfast: 32, reg_window: 60}
  residual_momentum_64:
    function: systems.crypto_perps.rules.rule_library.residual_momentum
    data:
      - "data.daily_prices"
      - "data.get_spx_price"
      - "data.get_dxy_price"
      - "data.get_us10y_yield"
    other_args: {Lfast: 64, reg_window: 60}

# ============================================================================
# FORECAST WEIGHTS — DEFAULT PROFILE  (revised 2026-02-18 after IC audit)
# ============================================================================
# 7 equal families × 1/7 each (~14.286% per family)
#
# IC audit results (15 sample instruments, dataset_538registry_6yr_jagged):
#   resmom    IC@5d=0.0767  t=2.8  ← #1 family (beats all trend families)
#   trend     IC@5d=0.0554  t=2.1
#   carry     IC@5d=-0.009         ← excluded (negative IC, per previous audit)
#   reversion IC@5d=-0.018         ← excluded (negative IC, per previous audit)
#
# Per-family budget allocation:
#   ewmac         1/7 ÷ 3 rules = 1/21  ≈ 4.762% each
#   breakout      1/7 ÷ 4 rules = 1/28  ≈ 3.571% each
#   normmom       1/7 ÷ 3 rules = 1/21  ≈ 4.762% each
#   accel         1/7 ÷ 3 rules = 1/21  ≈ 4.762% each
#   assettrend    1/7 ÷ 4 rules = 1/28  ≈ 3.571% each
#   relmomentum   1/7 ÷ 2 rules = 1/14  ≈ 7.143% each
#   resmom        1/7 ÷ 3 rules = 1/21  ≈ 4.762% each
#
# Sum = 12×(1/21) + 8×(1/28) + 2×(1/14) = 4/7 + 2/7 + 1/7 = 1.000 ✓
# ============================================================================

forecast_weights:
  # EWMAC: 3 rules × 4.762% = 14.286%
  # (ewmac_4 removed: 77 rt/yr, 62% instruments fail annual SR cost test)
  ewmac_8:   0.047619
  ewmac_16:  0.047619
  ewmac_32:  0.047619

  # Breakout: 4 rules × 3.571% = 14.286%
  # (breakout_10 removed: 132 rt/yr, 100% fail)
  breakout_20:  0.035714
  breakout_40:  0.035714
  breakout_80:  0.035714
  breakout_160: 0.035714

  # Normmom: 3 rules × 4.762% = 14.286%
  # (normmom_4 removed: 68 rt/yr, 37% fail)
  normmom_8:   0.047619
  normmom_16:  0.047619
  normmom_32:  0.047619

  # Accel: 3 rules × 4.762% = 14.286%
  accel_16:  0.047619
  accel_32:  0.047619
  accel_64:  0.047619

  # Assettrend: 4 rules × 3.571% = 14.286%
  assettrend_8:  0.035714
  assettrend_16: 0.035714
  assettrend_32: 0.035714
  assettrend_64: 0.035714

  # Relmomentum: 2 rules × 7.143% = 14.286%
  # (relmomentum_10 removed: 132 rt/yr, 100% fail)
  relmomentum_20: 0.071429
  relmomentum_40: 0.071429

  # ResidualMomentum: 3 rules × 4.762% = 14.286%
  # IC audit 2026-02-18: resmom is #1 family (IC@5d=0.077, t=2.8, IC@21d=0.112)
  # Ranks: resmom_16=#7, resmom_32=#13, resmom_64=#14 out of 48 rules
  # Turnover expected to be ≤ comparable EWMAC (residuals are smoother series)
  residual_momentum_16: 0.047619
  residual_momentum_32: 0.047619
  residual_momentum_64: 0.047619

  # Removed entirely (cost audit):
  #   btc_lead_lag_1/2: 480 rt/yr, annual drag ~1.4 SR each
  #   streversal_1:     424 rt/yr, annual drag 1.26 SR

forecast_cap: 20.0

# ============================================================================
# SIZING AND CONSTRAINTS
# ============================================================================

sizing:
  vol_days: 35

constraints:
  correlation_span: 60
  correlation_min_periods: 20

execution:
  buffer_frac: 0.1

costs:
  spread_estimate: 0.0005
  taker_fee_frac: 0.0005

output:
  equity_curve_file: "equity_curve.csv"
  positions_file: "positions.csv"
  pnl_breakdown_file: "pnl_breakdown.csv"
  write_diagnostics: true
  diagnostics_file: "diagnostics.parquet"

diagnostics:
  enabled: true

