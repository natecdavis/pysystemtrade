# ============================================================================
# DYNAMIC UNIVERSE CONFIG V1
# ============================================================================
# Created: 2026-02-13
# Dataset: data/example_crypto_perps_30x6yr_jagged.parquet (30 instruments, 6 years)
# Purpose: Test dynamic universe with walk-forward cost filtering
# Based on: crypto_perps_baseline_v1.yaml
# ============================================================================

system:
  capital: 5000.0  # Starting capital in USD
  vol_target_ann: 0.25  # Target annualized volatility (25%)
  gross_leverage_cap: 2.0  # Maximum gross leverage
  idm_cap: 2.5  # Maximum Instrument Diversification Multiplier
  min_position_frac: 0.03  # Minimum position fraction (3%)
  allow_jagged: true  # REQUIRED for dynamic universe (instruments vary over time)

# Dynamic universe parameters (Carver's SR cost thresholds)
dynamic_universe:
  max_sr_cost_per_trade: 0.01  # Maximum 1% of annual SR per trade
  max_sr_cost_annual: 0.13     # Maximum 13% of annual SR total
  stack_turnover: 15.0         # Expected turnover (round-trips/year) for stack
  adv_window: 30               # ADV calculation window (days)
  fee_bps: 5                   # One-way fee in basis points

# Note: No hardcoded instrument list - dynamic universe determines eligibility
# Dataset should contain all candidate instruments (30x in this case)

trading_rules:
  ewmac8_32:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 8
      Lslow: 32
  ewmac16_64:
    function: systems.provided.rules.ewmac.ewmac_forecast_with_defaults
    other_args:
      Lfast: 16
      Lslow: 64

forecast_scalars:
  ewmac8_32: 5.3
  ewmac16_64: 2.65

forecast_weights:
  ewmac8_32: 0.5
  ewmac16_64: 0.5

forecast_cap: 20.0

sizing:
  vol_days: 35  # Volatility lookback for position sizing

constraints:
  correlation_span: 60  # EWMA correlation span (shorter for crypto)
  correlation_min_periods: 20  # Minimum periods for correlation

execution:
  buffer_frac: 0.1  # Trading buffer (10% of position volatility)

costs:
  spread_estimate: 0.0005  # 5 bps spread estimate (fallback if dynamic unavailable)
  taker_fee_frac: 0.0004  # 4 bps taker fee

output:
  equity_curve_file: "equity_curve.csv"
  positions_file: "positions.csv"
  pnl_breakdown_file: "pnl_breakdown.csv"
  write_diagnostics: true
  diagnostics_file: "diagnostics.parquet"

diagnostics:
  enabled: true
