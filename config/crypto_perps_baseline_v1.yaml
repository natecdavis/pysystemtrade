# ============================================================================
# FROZEN BASELINE CONFIG V1 - DO NOT MODIFY
# ============================================================================
# Created: 2026-01-25
# Dataset: data/example_crypto_perps_5yr.parquet (2020-2024, 4 instruments)
# Purpose: Stage-1 research baseline for behavior analysis
# Any changes require new version (v2, v3, etc.)
# ============================================================================

system:
  capital: 5000.0  # Starting capital in USD
  vol_target_ann: 0.25  # Target annualized volatility (25%)
  gross_leverage_cap: 2.0  # Maximum gross leverage
  idm_cap: 2.5  # Maximum Instrument Diversification Multiplier
  min_position_frac: 0.03  # Minimum position fraction (3%)

universe:
  # Static for Phase 1 - top 5 instruments by ADV
  layer_a_instruments:
    - BTCUSDT_PERP
    - ETHUSDT_PERP
    - BNBUSDT_PERP
    - SOLUSDT_PERP
    - XRPUSDT_PERP
  daily_min_adv_notional: 10000000.0  # $10M minimum ADV (daily eligibility filter)

  # Phase 2: Monthly review settings (optional, comment out for Phase 1 behavior)
  # review_freq: BMS  # Business Month Start (first business day of month)
                      # Accepts pandas offset aliases: 'BMS', 'MS', 'M', etc.
                      # BMS = first business day (recommended for monthly reviews)
                      # M = last day of month (month-end)
  min_adv_notional: 50000000.0  # $50M Layer A membership threshold (at reviews)
  min_history_days: 365  # Minimum data coverage for Layer A (365 days)

  # Phase 2: State machine settings
  data_gap_days: 2  # Max consecutive missing days for daily eligibility
  forced_exit_days: 5  # Days to decay to 0 for INELIGIBLE_HOLD state
  banned_instruments: []  # List of banned instruments (BANNED_FLATTEN state)
                          # Example: ['LUNAUSDT_PERP']  # Exchange delist, etc.

rules:
  # EWMAC pairs: [Lfast, Lslow]
  ewmac_pairs:
    - [8, 32]
    - [16, 64]
  ewmac_vol_days: 35  # Volatility lookback for EWMAC

  # Funding carry parameters
  carry_fast_halflife: 3  # Fast EWMA half-life in days
  carry_slow_halflife: 30  # Slow EWMA half-life in days

forecasts:
  target_abs: 10.0  # Target mean absolute forecast
  cap: 20.0  # Forecast cap (±20)
  # Equal weights for Phase 1 (optional, defaults to equal if not specified)
  # rule_weights:
  #   ewmac_8_32: 0.25
  #   ewmac_16_64: 0.25
  #   carry_funding: 0.5

  # Phase 2: Relative momentum (optional, set to true to enable)
  use_relative_momentum: false  # Enable cross-sectional momentum rule
  relmom:
    horizon: 20  # Momentum lookback period (days)
    ewma_span: 60  # Smoothing span for momentum (days)
    weight: 1.0  # Rule weight (equal weight by default)

sizing:
  vol_days: 35  # Volatility lookback for position sizing

constraints:
  correlation_span: 60  # EWMA correlation span (shorter for crypto)
  correlation_min_periods: 20  # Minimum periods for correlation

execution:
  buffer_frac: 0.1  # Trading buffer (10% of position volatility)

costs:
  spread_estimate: 0.0005  # 5 bps spread estimate (EXPLICIT for v1)
  taker_fee_frac: 0.0004  # 4 bps taker fee (EXPLICIT for v1)

output:
  equity_curve_file: "equity_curve.csv"
  positions_file: "positions.csv"
  pnl_breakdown_file: "pnl_breakdown.csv"  # Optional detailed breakdown

  # Phase 2: Diagnostics output (optional)
  write_diagnostics: true  # ENABLED for Stage-1 research
  diagnostics_file: "diagnostics.parquet"  # Diagnostics output file

# Research diagnostics (for ablation studies and analysis)
diagnostics:
  enabled: true  # ENABLED for Stage-1 research - writes detailed daily data
